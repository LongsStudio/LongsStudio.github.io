<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>XOR 异或加密解密工具（访问加密版）</title>
    <style>
        * {box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui}
        body {max-width: 900px; margin: 30px auto; padding: 0 20px; background: #f5f7fa; display: none;}
        h2 {color: #222; margin-bottom: 20px; text-align: center}
        .box {background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 12px #00000010; margin-bottom: 16px}
        label {display: block; margin: 10px 0 6px; font-weight: 500}
        input, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 15px;
        }
        /* 只读密钥框灰色区分 */
        #keyInput {background:#eee; color:#444; cursor:not-allowed;}
        textarea {min-height: 120px; resize: vertical}
        .btn-group {display: flex; gap: 10px; margin: 15px 0}
        .btn-row {display: flex; gap:10px; margin-top:10px;}
        button {
            flex: 1; padding: 13px; border: none; border-radius: 6px;
            font-size: 15px; cursor: pointer; font-weight: 500;
        }
        #encryptBtn {background: #2563eb; color: white}
        #decryptBtn {background: #059669; color: white}
        #clearBtn {background: #666; color: white}
        #copyBtn {background:#9333ea; color:#fff;}
        .tip {margin-top:8px; color:#666; font-size:13px}
        .msg {color:#069457; margin-top:6px; font-size:14px; display:none;}
    </style>
</head>
<body>
    <h2>XOR 异或加密工具（兼容C++/易语言）</h2>

    <div class="box">
        <label>固定密钥（只读，不可修改）</label>
        <input type="text" id="keyInput" value="longs" readonly>
        <div class="tip">统一密钥，网页、C++互通专用</div>
    </div>

    <div class="box">
        <label>原文 / 密文（十六进制）</label>
        <textarea id="dataInput" placeholder="加密输入明文；解密输入十六进制密文"></textarea>

        <div class="btn-group">
            <button id="encryptBtn">🔒 XOR 加密（输出十六进制）</button>
            <button id="decryptBtn">🔓 XOR 解密（输入十六进制）</button>
            <button id="clearBtn">清空全部</button>
        </div>
    </div>

    <div class="box">
        <label>转换结果</label>
        <textarea id="resultOutput" readonly placeholder="转换结果将展示在此"></textarea>
        <div class="btn-row">
            <button id="copyBtn">📋 一键复制结果</button>
        </div>
        <div class="msg" id="copyTip">复制成功！</div>
    </div>

<script>
// ========== 访问密码配置，可自行修改这里的密码 ==========
const ACCESS_PASSWORD = "LongsStudio"; 

// 页面加载先验证密码
window.onload = function(){
    let pwd = prompt("请输入访问密码，解锁加密工具：");
    if(pwd !== ACCESS_PASSWORD){
        alert("密码错误，禁止使用工具");
        document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:50px'>权限不足，页面已锁定</h2>";
        return;
    }
    // 密码正确显示页面
    document.body.style.display = "block";
}

// UTF8字符串转Uint8Array字节数组
function str2utf8(s) {
    return new TextEncoder().encode(s);
}

// 字节数组转小写16进制字符串
function buf2hex(buf) {
    return Array.from(buf).map(x => x.toString(16).padStart(2, '0')).join('');
}

// 十六进制字符串转Uint8Array字节数组
function hex2buf(hex) {
    if (hex.length % 2 !== 0) throw new Error("密文格式错误，十六进制长度必须偶数");
    let arr = [];
    for (let i = 0; i < hex.length; i += 2) {
        arr.push(parseInt(hex.substr(i, 2), 16));
    }
    return new Uint8Array(arr);
}

// XOR 核心算法
function xorProcess(bytes, keyBytes) {
    const out = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) {
        out[i] = bytes[i] ^ keyBytes[i % keyBytes.length];
    }
    return out;
}

// 加密：明文 → 十六进制密文
function encrypt(text, key) {
    const dataBuf = str2utf8(text);
    const keyBuf = str2utf8(key);
    if (keyBuf.length === 0) return "错误：密钥不能为空";
    const encBuf = xorProcess(dataBuf, keyBuf);
    return buf2hex(encBuf);
}

// 解密：十六进制密文 → 明文
function decrypt(hexStr, key) {
    try {
        const dataBuf = hex2buf(hexStr);
        const keyBuf = str2utf8(key);
        if (keyBuf.length === 0) return "错误：密钥不能为空";
        const decBuf = xorProcess(dataBuf, keyBuf);
        return new TextDecoder().decode(decBuf);
    } catch (e) {
        return "解密失败：" + e.message;
    }
}

// 绑定元素
const keyInput = document.getElementById("keyInput");
const dataInput = document.getElementById("dataInput");
const resultOutput = document.getElementById("resultOutput");
const encryptBtn = document.getElementById("encryptBtn");
const decryptBtn = document.getElementById("decryptBtn");
const clearBtn = document.getElementById("clearBtn");
const copyBtn = document.getElementById("copyBtn");
const copyTip = document.getElementById("copyTip");

// 加密按钮
encryptBtn.onclick = () => {
    const text = dataInput.value;
    const key = keyInput.value;
    resultOutput.value = encrypt(text, key);
    copyTip.style.display = "none";
};

// 解密按钮
decryptBtn.onclick = () => {
    const hex = dataInput.value.trim();
    const key = keyInput.value;
    resultOutput.value = decrypt(hex, key);
    copyTip.style.display = "none";
};

// 清空按钮
clearBtn.onclick = () => {
    dataInput.value = "";
    resultOutput.value = "";
    copyTip.style.display = "none";
};

// 一键复制结果
copyBtn.onclick = async () => {
    const text = resultOutput.value;
    if(!text){
        alert("暂无内容可复制");
        return;
    }
    await navigator.clipboard.writeText(text);
    copyTip.style.display = "block";
    setTimeout(()=>copyTip.style.display="none",1500);
};
</script>
</body>
</html>
