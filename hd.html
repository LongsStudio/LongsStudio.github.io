<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公告 · 智慧白板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e6e6e6;
            min-height: 100vh;
        }
        
        /* 加载动画 */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-container.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4cc9f0;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        .loading-text {
            font-size: 1.2rem;
            color: #a0a0c0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 容器 */
        .container {
            width: 100%;
            max-width: 100%;
            padding: 20px 15px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        
        .header-icon {
            font-size: 3rem;
            color: #4cc9f0;
            margin-bottom: 15px;
        }
        
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .header p {
            font-size: 1rem;
            color: #a0a0c0;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        /* 公告列表 */
        .announcement-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .announcement-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .announcement-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: rgba(76, 201, 240, 0.3);
        }
        
        .announcement-card.highlight {
            border-left: 5px solid #f72585;
            background: rgba(247, 37, 133, 0.05);
        }
        
        .announcement-card.warning {
            border-left: 5px solid #ff9e00;
            background: rgba(255, 158, 0, 0.05);
        }
        
        .announcement-card.info {
            border-left: 5px solid #4cc9f0;
            background: rgba(76, 201, 240, 0.05);
        }
        
        .announcement-card.success {
            border-left: 5px solid #00b894;
            background: rgba(0, 184, 148, 0.05);
        }
        
        .announcement-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .announcement-time {
            font-size: 0.85rem;
            color: #a0a0c0;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .announcement-time i {
            font-size: 0.8rem;
        }
        
        .announcement-type {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .announcement-type.highlight {
            background: rgba(247, 37, 133, 0.2);
            color: #f72585;
        }
        
        .announcement-type.warning {
            background: rgba(255, 158, 0, 0.2);
            color: #ff9e00;
        }
        
        .announcement-type.info {
            background: rgba(76, 201, 240, 0.2);
            color: #4cc9f0;
        }
        
        .announcement-type.success {
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
        }
        
        .announcement-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
            line-height: 1.4;
        }
        
        .announcement-content {
            font-size: 1rem;
            color: #d1d1e9;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .announcement-content p {
            margin-bottom: 10px;
        }
        
        .announcement-content ul, .announcement-content ol {
            padding-left: 20px;
            margin-bottom: 10px;
        }
        
        .announcement-content li {
            margin-bottom: 5px;
        }
        
        .announcement-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .announcement-author {
            font-size: 0.9rem;
            color: #a0a0c0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .announcement-author i {
            font-size: 0.9rem;
        }
        
        .announcement-views {
            font-size: 0.85rem;
            color: #a0a0c0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
        }
        
        .empty-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        
        .empty-text {
            font-size: 1.2rem;
            color: #a0a0c0;
            margin-bottom: 10px;
        }
        
        .empty-subtext {
            font-size: 1rem;
            color: #888;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            padding: 20px 0;
            color: #a0a0c0;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .footer a {
            color: #4cc9f0;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header {
                padding: 15px 0 25px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .announcement-card {
                padding: 18px;
            }
            
            .announcement-title {
                font-size: 1.2rem;
            }
            
            .announcement-content {
                font-size: 0.95rem;
            }
        }
        
        @media (max-width: 480px) {
            .announcement-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .announcement-title {
                font-size: 1.1rem;
            }
        }
        
        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            color: white;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
        }
        
        .refresh-btn:active {
            transform: scale(0.95) rotate(90deg);
        }
    </style>
</head>

            {

            },
            // ===== 新增公告：2026-03-12 暂停更新通知 =====
            {
                id: 9,
                time: "2026-03-12 10:00",
                type: "info",                // 使用info样式 (蓝绿色调)
                typeText: "开发动态",          // 自定义标签
                title: "关于智慧白板暂停更新的说明",
                content: `
                    <p>亲爱的用户：</p>
                    <p>为了给大家带来更优质的服务和体验，我们决定将智慧白板的更新计划稍作调整。目前团队正专注于一项更加重要的内部项目开发，因此智慧白板将<strong>暂停更新一段时间</strong>。这只是短暂的暂停，预计在<strong>2026年6月30日左右</strong>恢复正常更新。</p>
                    <p>在此期间，现有版本的所有功能均可正常使用。同时，我们也在积极筹备下一个大版本，<strong>下个版本将接入AI功能</strong>，敬请期待！</p>

        // DOM元素
        const loadingContainer = document.getElementById('loadingContainer');
        const announcementList = document.getElementById('announcementList');
        const refreshBtn = document.getElementById('refreshBtn');
        
        // 模拟加载过程
        window.addEventListener('load', () => {
            // 延迟加载数据，让加载动画显示一会儿
            setTimeout(() => {
                loadAnnouncements();
                loadingContainer.classList.add('hidden');
            }, 1200);
        });
        
        // 如果页面加载很快，确保加载动画至少显示一定时间
        setTimeout(() => {
            if (!loadingContainer.classList.contains('hidden')) {
                loadAnnouncements();
                loadingContainer.classList.add('hidden');
            }
        }, 3000);
        
        // 加载公告
        function loadAnnouncements() {
            announcementList.innerHTML = '';
            
            if (announcements.length === 0) {
                // 显示空状态
                announcementList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="far fa-newspaper"></i>
                        </div>
                        <div class="empty-text">暂无公告</div>
                        <div class="empty-subtext">暂时没有新的公告信息</div>
                    </div>
                `;
                return;
            }
            
            // 按时间倒序排列（最新的在前）
            const sortedAnnouncements = [...announcements].sort((a, b) => {
                return new Date(b.time) - new Date(a.time);
            });
            
            // 渲染公告卡片
            sortedAnnouncements.forEach(announcement => {
                const announcementCard = document.createElement('div');
                announcementCard.className = `announcement-card ${announcement.type}`;
                
                // 格式化时间显示
                const timeText = formatTime(announcement.time);
                
                announcementCard.innerHTML = `
                    <div class="announcement-header">
                        <div class="announcement-time">
                            <i class="far fa-clock"></i> ${timeText}
                        </div>
                        <div class="announcement-type ${announcement.type}">
                            ${announcement.typeText}
                        </div>
                    </div>
                    
                    <div class="announcement-title">
                        ${announcement.title}
                    </div>
                    
                    <div class="announcement-content">
                        ${announcement.content}
                    </div>
                    
                    <div class="announcement-footer">
                        <div class="announcement-author">
                            <i class="far fa-user"></i> ${announcement.author}
                        </div>
                        <div class="announcement-views">
                            <i class="far fa-eye"></i> ${announcement.views.toLocaleString()} 次查看
                        </div>
                    </div>
                `;
                
                announcementList.appendChild(announcementCard);
            });
        }
        
        // 格式化时间显示
        function formatTime(timeString) {
            const date = new Date(timeString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffMins < 1) {
                return '刚刚';
            } else if (diffMins < 60) {
                return `${diffMins}分钟前`;
            } else if (diffHours < 24) {
                return `${diffHours}小时前`;
            } else if (diffDays < 7) {
                return `${diffDays}天前`;
            } else {
                // 显示完整日期
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
        }
        
        // 刷新按钮功能
        refreshBtn.addEventListener('click', function() {
            // 添加旋转动画
            this.style.transform = 'rotate(180deg)';
            
            // 显示加载动画
            loadingContainer.classList.remove('hidden');
            
            // 模拟重新加载数据
            setTimeout(() => {
                // 这里可以实际从服务器获取新数据
                // 现在只是重新渲染现有数据
                loadAnnouncements();
                
                // 隐藏加载动画
                loadingContainer.classList.add('hidden');
                
                // 恢复按钮状态
                setTimeout(() => {
                    this.style.transform = '';
                }, 300);
                
                // 显示刷新成功提示
                showToast('公告已刷新');
            }, 800);
        });
        
        // 显示Toast提示
        function showToast(message) {
            // 创建Toast元素
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: rgba(0, 0, 0, 0.9);
                color: white;
                padding: 12px 24px;
                border-radius: 10px;
                font-size: 0.95rem;
                z-index: 1000;
                transition: transform 0.3s ease;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
                border-left: 4px solid #4cc9f0;
            `;
            
            document.body.appendChild(toast);
            
            // 显示Toast
            setTimeout(() => {
                toast.style.transform = 'translateX(-50%) translateY(0)';
            }, 10);
            
            // 3秒后隐藏并移除Toast
            setTimeout(() => {
                toast.style.transform = 'translateX(-50%) translateY(100px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }
        
        // 模拟从服务器获取数据（可以替换为真实的API调用）
        function fetchAnnouncementsFromServer() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve(announcements);
                }, 500);
            });
        }
