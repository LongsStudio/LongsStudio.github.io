<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>图片资源工坊</title>
    <!-- 兼容性补丁 (ES5/ES6) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/es5-shim/4.6.7/es5-shim.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/es6-shim/0.35.8/es6-shim.min.js">
    </script>
    <!-- Font Awesome 6 (IE11 兼容) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 0 20px 60px;
            min-height: 100vh;
        }
        /* ===== 头部 ===== */
        .header {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 0 20px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: justify;
            justify-content: space-between;
            gap: 16px 24px;
        }
        .logo-area {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 32px;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.12);
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: center;
            justify-content: center;
        }
        .logo-text h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1e293b;
        }
        .logo-text small {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: #94a3b8;
            margin-top: -2px;
        }
        .header-actions {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 12px;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
        }
        .search-box {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            background: #ffffff;
            border-radius: 40px;
            padding: 6px 6px 6px 18px;
            border: 1px solid #e2e8f0;
            min-width: 200px;
        }
        .search-box input {
            border: none;
            outline: none;
            font-size: 14px;
            padding: 8px 0;
            -ms-flex: 1;
            flex: 1;
            min-width: 100px;
            background: transparent;
            color: #1e293b;
        }
        .search-box input::-ms-clear {
            display: none;
        }
        .search-box button {
            background: #3b82f6;
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: center;
            justify-content: center;
            -ms-flex-negative: 0;
            flex-shrink: 0;
        }
        .search-box button:hover {
            background: #2563eb;
        }
        .btn-refresh {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            display: -ms-inline-flexbox;
            display: inline-flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 8px;
            -ms-flex-negative: 0;
            flex-shrink: 0;
        }
        .btn-refresh:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .btn-refresh i {
            color: #3b82f6;
        }

        /* ===== 分类标签 ===== */
        .categories {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 6px 0 14px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .category-chip {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #64748b;
            cursor: pointer;
            display: -ms-inline-flexbox;
            display: inline-flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 6px;
            -ms-flex-negative: 0;
            flex-shrink: 0;
        }
        .category-chip:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #f8faff;
        }
        .category-chip.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }

        /* ===== 统计 ===== */
        .stats-bar {
            max-width: 1400px;
            margin: 16px auto 0;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-pack: justify;
            justify-content: space-between;
            -ms-flex-align: center;
            align-items: center;
            font-size: 14px;
            color: #64748b;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            gap: 4px 12px;
        }
        .stats-bar span {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 6px;
        }
        .stats-bar .count {
            font-weight: 600;
            color: #1e293b;
        }

        /* ===== 图片网格 (兼容IE: flex + 负边距) ===== */
        .gallery {
            max-width: 1400px;
            margin: 24px auto 0;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            -ms-flex-pack: start;
            justify-content: flex-start;
            margin-left: -10px;
            margin-right: -10px;
        }
        .image-card {
            width: 240px;
            margin: 0 10px 20px 10px;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
            -ms-flex: 0 0 auto;
            flex: 0 0 auto;
            transition: box-shadow 0.3s;
            position: relative;
        }
        .image-card:hover {
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
        }
        .image-card .img-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            background: #eef2f6;
            overflow: hidden;
        }
        .image-card .img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 骨架屏 (IE10+支持关键帧) */
        .image-card .img-wrapper .skeleton {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #eef2f6 25%, #f8fafc 50%, #eef2f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        .image-card .img-wrapper img.loaded {
            opacity: 1;
        }
        .image-card .img-wrapper img:not(.loaded) {
            opacity: 0;
        }

        .image-card .card-footer {
            padding: 14px 16px 16px;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-pack: justify;
            justify-content: space-between;
            -ms-flex-align: center;
            align-items: center;
        }
        .image-card .card-footer .info {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-direction: column;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
            -ms-flex: 1;
            flex: 1;
            min-width: 0;
        }
        .image-card .card-footer .info .title {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }
        .image-card .card-footer .info .sub {
            font-size: 12px;
            color: #94a3b8;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 6px;
        }
        .image-card .card-footer .actions {
            display: -ms-flexbox;
            display: flex;
            gap: 4px;
            -ms-flex-negative: 0;
            flex-shrink: 0;
            -ms-flex-align: center;
            align-items: center;
        }
        .image-card .card-footer .actions button {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .image-card .card-footer .actions button:hover {
            background: #f1f5f9;
            color: #3b82f6;
        }
        .image-card .card-footer .actions button.liked {
            color: #ef4444;
        }
        .image-card .card-footer .actions button.liked:hover {
            color: #dc2626;
        }
        .image-card .card-footer .actions button.download-btn:hover {
            color: #22c55e;
        }

        /* ===== 灯箱 ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.82);
            display: none;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: center;
            justify-content: center;
            padding: 30px;
        }
        .lightbox.open {
            display: -ms-flexbox;
            display: flex;
        }
        .lightbox .lb-content {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            background: #0f172a;
            position: relative;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: center;
            justify-content: center;
        }
        .lightbox .lb-content img {
            display: block;
            max-width: 100%;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .lightbox .lb-toolbar {
            position: absolute;
            top: 16px;
            right: 20px;
            display: -ms-flexbox;
            display: flex;
            gap: 10px;
            -ms-flex-align: center;
            align-items: center;
        }
        .lightbox .lb-toolbar button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: none;
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-pack: center;
            justify-content: center;
        }
        .lightbox .lb-toolbar button:hover {
            background: rgba(255, 255, 255, 0.28);
        }
        .lightbox .lb-toolbar .lb-download:hover {
            background: rgba(34, 197, 94, 0.4);
        }
        .lightbox .lb-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 28px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: #fff;
            pointer-events: none;
        }
        .lightbox .lb-info .lb-title {
            font-size: 20px;
            font-weight: 600;
        }
        .lightbox .lb-info .lb-sub {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        /* 灯箱下载按钮（底部额外入口） */
        .lightbox .lb-download-bottom {
            position: absolute;
            bottom: 90px;
            right: 28px;
            background: rgba(34, 197, 94, 0.25);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-align: center;
            align-items: center;
            gap: 8px;
            transition: background 0.25s;
            pointer-events: auto;
        }
        .lightbox .lb-download-bottom:hover {
            background: rgba(34, 197, 94, 0.45);
        }
        .lightbox .lb-download-bottom i {
            font-size: 16px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            width: 100%;
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-size: 22px;
            color: #475569;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 15px;
        }

        /* ===== Toast 提示 ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 99999;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        /* ===== 响应式 (兼容IE的媒体查询) ===== */
        @media screen and (max-width: 768px) {
            body {
                padding: 0 12px 40px;
            }
            .header {
                -ms-flex-direction: column;
                flex-direction: column;
                -ms-flex-align: stretch;
                align-items: stretch;
                gap: 12px;
                padding: 18px 0 12px;
            }
            .logo-area {
                -ms-flex-pack: center;
                justify-content: center;
            }
            .header-actions {
                -ms-flex-pack: center;
                justify-content: center;
            }
            .search-box {
                min-width: 0;
                -ms-flex: 1;
                flex: 1;
            }
            .search-box input {
                min-width: 60px;
                font-size: 13px;
            }
            .btn-refresh {
                padding: 6px 14px;
                font-size: 13px;
            }
            .categories {
                -ms-flex-pack: center;
                justify-content: center;
                gap: 6px 10px;
                padding: 10px 0 14px;
            }
            .category-chip {
                font-size: 12px;
                padding: 4px 14px;
            }
            .image-card {
                width: 180px;
                margin: 0 8px 16px 8px;
            }
            .image-card .card-footer .info .title {
                max-width: 100px;
                font-size: 13px;
            }
            .stats-bar {
                font-size: 13px;
                -ms-flex-wrap: wrap;
                flex-wrap: wrap;
                gap: 4px;
            }
            .lightbox {
                padding: 16px;
            }
            .lightbox .lb-content {
                max-width: 100vw;
                max-height: 80vh;
            }
            .lightbox .lb-info .lb-title {
                font-size: 17px;
            }
            .lightbox .lb-toolbar button {
                width: 40px;
                height: 40px;
                font-size: 17px;
            }
            .lightbox .lb-download-bottom {
                bottom: 80px;
                right: 16px;
                padding: 8px 16px;
                font-size: 13px;
            }
        }
        @media screen and (max-width: 480px) {
            .image-card {
                width: 140px;
                margin: 0 6px 12px 6px;
            }
            .image-card .card-footer {
                padding: 10px 12px 12px;
                -ms-flex-direction: column;
                flex-direction: column;
                -ms-flex-align: start;
                align-items: flex-start;
                gap: 6px;
            }
            .image-card .card-footer .info .title {
                max-width: 100%;
            }
            .image-card .card-footer .actions {
                -ms-flex-item-align: end;
                align-self: flex-end;
            }
            .header-actions .btn-refresh span {
                display: none;
            }
            .lightbox .lb-download-bottom {
                bottom: 72px;
                right: 12px;
                padding: 6px 14px;
                font-size: 12px;
            }
            .lightbox .lb-toolbar {
                top: 12px;
                right: 14px;
                gap: 6px;
            }
            .lightbox .lb-toolbar button {
                width: 36px;
                height: 36px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 头部 ===== -->
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-images"></i></div>
            <div class="logo-text">
                <h1>🖼️ 资源工坊</h1>
                <small>海量图片 · 支持下载</small>
            </div>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索图片名称..." />
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <button class="btn-refresh" id="refreshBtn">
                <i class="fas fa-sync-alt"></i>
                <span>换一批</span>
            </button>
        </div>
    </header>

    <!-- ===== 分类 ===== -->
    <div class="categories" id="categoryContainer">
        <button class="category-chip active" data-category="all"><i class="fas fa-th-large"></i> 全部</button>
        <button class="category-chip" data-category="nature"><i class="fas fa-tree"></i> 自然</button>
        <button class="category-chip" data-category="city"><i class="fas fa-city"></i> 城市</button>
        <button class="category-chip" data-category="people"><i class="fas fa-user"></i> 人物</button>
        <button class="category-chip" data-category="tech"><i class="fas fa-microchip"></i> 科技</button>
        <button class="category-chip" data-category="art"><i class="fas fa-palette"></i> 艺术</button>
        <button class="category-chip" data-category="food"><i class="fas fa-utensils"></i> 美食</button>
        <button class="category-chip" data-category="animals"><i class="fas fa-paw"></i> 动物</button>
    </div>

    <!-- ===== 统计 ===== -->
    <div class="stats-bar">
        <span><i class="far fa-image"></i> 共 <span class="count" id="imageCount">0</span> 张图片</span>
        <span id="activeFilter"><i class="fas fa-filter"></i> 全部</span>
    </div>

    <!-- ===== 图片网格 ===== -->
    <div class="gallery" id="gallery"></div>

    <!-- ===== 灯箱 ===== -->
    <div class="lightbox" id="lightbox">
        <div class="lb-content">
            <img id="lbImage" src="" alt="预览大图" />
            <!-- 右上角工具栏 -->
            <div class="lb-toolbar">
                <button class="lb-download" id="lbDownload" title="下载图片">
                    <i class="fas fa-download"></i>
                </button>
                <button class="lb-close" id="lbClose" title="关闭">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <!-- 底部信息 -->
            <div class="lb-info">
                <div class="lb-title" id="lbTitle">图片标题</div>
                <div class="lb-sub" id="lbSub">图片来源 · 高清</div>
            </div>
            <!-- 底部下载按钮 (额外入口) -->
            <button class="lb-download-bottom" id="lbDownloadBottom">
                <i class="fas fa-download"></i> 下载图片
            </button>
        </div>
    </div>

    <!-- ===== Toast 提示 ===== -->
    <div class="toast" id="toast"></div>

    <script>
        /* ============================================================
           兼容 IE11 的 JavaScript (ES5)  + 下载功能
           ============================================================ */

        // 分类映射
        var CATEGORIES = ['nature', 'city', 'people', 'tech', 'art', 'food', 'animals'];
        var CATEGORY_NAMES = {
            nature: '自然',
            city: '城市',
            people: '人物',
            tech: '科技',
            art: '艺术',
            food: '美食',
            animals: '动物'
        };

        var TITLE_WORDS = [
            '晨曦', '暮光', '极光', '星空', '海浪', '森林', '山谷', '溪流', '瀑布', '沙漠',
            '摩天楼', '古堡', '桥梁', '港口', '街道', '广场', '地铁', '夜景', '日落', '日出',
            '微笑', '凝视', '奔跑', '跳跃', '沉思', '欢聚', '独行', '拥抱', '阅读', '演奏',
            '芯片', '代码', '机器人', '太空', '数据', '网络', '未来', '智能', '虚拟', '像素',
            '油画', '水彩', '素描', '涂鸦', '雕塑', '摄影', '抽象', '极简', '复古', '波普',
            '寿司', '牛排', '意面', '甜点', '咖啡', '红酒', '水果', '烘焙', '烧烤', '沙拉',
            '狮子', '鹰', '海豚', '蝴蝶', '猫', '狗', '马', '鹿', '鲸', '孔雀'
        ];

        // 生成单张图片数据
        function createImageData(index, seed) {
            var category = CATEGORIES[index % CATEGORIES.length];
            var word1 = TITLE_WORDS[(index * 3 + seed) % TITLE_WORDS.length];
            var word2 = TITLE_WORDS[(index * 7 + seed * 2) % TITLE_WORDS.length];
            var title = word1 + ' · ' + word2;
            var id = (index * 13 + seed * 7) % 1000 + 100;
            var width = 400 + (index * 23) % 200;
            var height = 300 + (index * 17) % 200;
            var url = 'https://picsum.photos/id/' + id + '/' + width + '/' + height;

            return {
                id: 'img-' + index + '-' + seed,
                title: title,
                category: category,
                categoryLabel: CATEGORY_NAMES[category] || category,
                url: url,
                thumbnail: url,
                width: width,
                height: height,
                author: '摄影者 #' + ((index + seed) % 99 + 1),
                likes: Math.floor(Math.random() * 200 + 10),
                liked: false
            };
        }

        // 生成图片列表
        function generateImages(count, seed) {
            var images = [];
            for (var i = 0; i < count; i++) {
                images.push(createImageData(i, seed));
            }
            return images;
        }

        // ===== 状态 =====
        var allImages = [];
        var filteredImages = [];
        var currentCategory = 'all';
        var searchQuery = '';
        var seed = Date.now();

        // DOM 引用
        var gallery = document.getElementById('gallery');
        var searchInput = document.getElementById('searchInput');
        var searchBtn = document.getElementById('searchBtn');
        var refreshBtn = document.getElementById('refreshBtn');
        var imageCountEl = document.getElementById('imageCount');
        var activeFilterEl = document.getElementById('activeFilter');
        var categoryChips = document.querySelectorAll('.category-chip');
        var lightbox = document.getElementById('lightbox');
        var lbImage = document.getElementById('lbImage');
        var lbTitle = document.getElementById('lbTitle');
        var lbSub = document.getElementById('lbSub');
        var lbClose = document.getElementById('lbClose');
        var lbDownload = document.getElementById('lbDownload');
        var lbDownloadBottom = document.getElementById('lbDownloadBottom');
        var toast = document.getElementById('toast');

        // 当前灯箱显示的图片ID
        var currentLightboxId = null;

        // ===== Toast 提示 =====
        var toastTimer = null;

        function showToast(msg, duration) {
            duration = duration || 1800;
            toast.textContent = msg;
            toast.className += ' show';
            if (toastTimer) {
                clearTimeout(toastTimer);
                toastTimer = null;
            }
            toastTimer = setTimeout(function() {
                toast.className = toast.className.replace(/\bshow\b/, '');
                toastTimer = null;
            }, duration);
        }

        // ===== 下载核心 (兼容IE) =====
        function downloadImageByUrl(url, filename) {
            if (!url) {
                showToast('⚠️ 图片地址无效');
                return;
            }
            // 如果filename没有扩展名，添加 .jpg
            if (filename && filename.indexOf('.') === -1) {
                filename += '.jpg';
            }
            if (!filename) {
                filename = 'image.jpg';
            }

            // 显示下载开始提示
            showToast('⬇️ 正在下载 ' + filename);

            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'blob';

            xhr.onload = function() {
                if (this.status === 200) {
                    var blob = this.response;
                    try {
                        if (navigator.msSaveBlob) {
                            // IE 专用
                            navigator.msSaveBlob(blob, filename);
                            showToast('✅ 下载完成: ' + filename);
                        } else {
                            // 现代浏览器
                            var link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            link.download = filename;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            setTimeout(function() {
                                URL.revokeObjectURL(link.href);
                            }, 200);
                            showToast('✅ 下载已开始: ' + filename);
                        }
                    } catch (e) {
                        showToast('⚠️ 下载失败，请重试');
                        console.error('Download error:', e);
                    }
                } else {
                    showToast('⚠️ 下载失败 (HTTP ' + this.status + ')');
                }
            };

            xhr.onerror = function() {
                showToast('⚠️ 网络错误，无法下载');
            };

            xhr.ontimeout = function() {
                showToast('⚠️ 下载超时，请重试');
            };

            xhr.timeout = 30000; // 30秒超时
            xhr.send();
        }

        // ===== 通过图片ID下载 =====
        function downloadImageById(id) {
            var img = null;
            for (var i = 0; i < allImages.length; i++) {
                if (allImages[i].id === id) {
                    img = allImages[i];
                    break;
                }
            }
            if (!img) {
                // 尝试从 filteredImages 中找
                for (var j = 0; j < filteredImages.length; j++) {
                    if (filteredImages[j].id === id) {
                        img = filteredImages[j];
                        break;
                    }
                }
            }
            if (!img) {
                showToast('⚠️ 未找到图片');
                return;
            }

            // 构建文件名: 分类_标题.jpg
            var filename = img.categoryLabel + '_' + img.title;
            // 移除文件名中的非法字符
            filename = filename.replace(/[\\/:*?"<>|]/g, '');
            downloadImageByUrl(img.url, filename);
        }

        // ===== 渲染 =====
        function render() {
            var result = [];
            var i, len;

            // 分类筛选
            if (currentCategory === 'all') {
                result = allImages.slice(0);
            } else {
                for (i = 0, len = allImages.length; i < len; i++) {
                    if (allImages[i].category === currentCategory) {
                        result.push(allImages[i]);
                    }
                }
            }

            // 搜索筛选
            if (searchQuery.trim() !== '') {
                var q = searchQuery.trim().toLowerCase();
                var filtered = [];
                for (i = 0, len = result.length; i < len; i++) {
                    var img = result[i];
                    if (img.title.toLowerCase().indexOf(q) !== -1 ||
                        img.categoryLabel.indexOf(q) !== -1 ||
                        img.author.toLowerCase().indexOf(q) !== -1) {
                        filtered.push(img);
                    }
                }
                result = filtered;
            }

            filteredImages = result;

            // 更新统计
            imageCountEl.innerHTML = filteredImages.length;
            var filterLabel = '全部';
            if (currentCategory !== 'all') {
                filterLabel = CATEGORY_NAMES[currentCategory] || currentCategory;
            }
            if (searchQuery.trim() !== '') {
                filterLabel += ' · 搜索 "' + searchQuery.trim() + '"';
            }
            activeFilterEl.innerHTML = '<i class="fas fa-filter"></i> ' + filterLabel;

            // 渲染网格
            if (filteredImages.length === 0) {
                gallery.innerHTML = '<div class="empty-state">' +
                    '<i class="fas fa-search"></i>' +
                    '<h3>没有找到匹配的图片</h3>' +
                    '<p>试试其他关键词或分类吧 ✨</p>' +
                    '</div>';
                return;
            }

            var html = '';
            for (i = 0, len = filteredImages.length; i < len; i++) {
                var img = filteredImages[i];
                var likedClass = img.liked ? 'liked' : '';
                var likeIcon = img.liked ? 'fas fa-heart' : 'far fa-heart';
                html += '<div class="image-card" data-index="' + i + '" data-id="' + img.id + '">' +
                    '<div class="img-wrapper">' +
                    '<div class="skeleton"></div>' +
                    '<img src="' + img.url + '" alt="' + img.title + '" />' +
                    '</div>' +
                    '<div class="card-footer">' +
                    '<div class="info">' +
                    '<span class="title">' + img.title + '</span>' +
                    '<span class="sub"><i class="fas fa-tag"></i> ' + img.categoryLabel +
                    ' <span style="margin-left:6px;">·</span> <i class="fas fa-camera"></i> ' + img.author +
                    '</span>' +
                    '</div>' +
                    '<div class="actions">' +
                    '<button class="like-btn ' + likedClass + '" data-id="' + img.id + '" title="点赞">' +
                    '<i class="' + likeIcon + '"></i>' +
                    '</button>' +
                    '<button class="view-btn" data-id="' + img.id + '" title="查看大图">' +
                    '<i class="fas fa-expand"></i>' +
                    '</button>' +
                    '<button class="download-btn" data-id="' + img.id + '" title="下载图片">' +
                    '<i class="fas fa-download"></i>' +
                    '</button>' +
                    '</div>' +
                    '</div>' +
                    '</div>';
            }
            gallery.innerHTML = html;

            // 图片加载完成后移除骨架
            var imgs = gallery.getElementsByTagName('img');
            for (i = 0, len = imgs.length; i < len; i++) {
                (function(img) {
                    if (img.complete) {
                        img.className += ' loaded';
                        var wrapper = img.parentNode;
                        var skeleton = wrapper.querySelector('.skeleton');
                        if (skeleton) skeleton.parentNode.removeChild(skeleton);
                    } else {
                        img.addEventListener('load', function() {
                            this.className += ' loaded';
                            var wrapper = this.parentNode;
                            var skeleton = wrapper.querySelector('.skeleton');
                            if (skeleton) skeleton.parentNode.removeChild(skeleton);
                        });
                        img.addEventListener('error', function() {
                            var wrapper = this.parentNode;
                            var skeleton = wrapper.querySelector('.skeleton');
                            if (skeleton) skeleton.parentNode.removeChild(skeleton);
                        });
                    }
                })(imgs[i]);
            }

            // 绑定事件
            attachCardEvents();
        }

        // ===== 事件绑定 =====
        function attachCardEvents() {
            var likeBtns = document.querySelectorAll('.like-btn');
            var viewBtns = document.querySelectorAll('.view-btn');
            var downloadBtns = document.querySelectorAll('.download-btn');
            var cards = document.querySelectorAll('.image-card');
            var i;

            for (i = 0; i < likeBtns.length; i++) {
                likeBtns[i].removeEventListener('click', handleLike);
                likeBtns[i].addEventListener('click', handleLike);
            }
            for (i = 0; i < viewBtns.length; i++) {
                viewBtns[i].removeEventListener('click', handleView);
                viewBtns[i].addEventListener('click', handleView);
            }
            for (i = 0; i < downloadBtns.length; i++) {
                downloadBtns[i].removeEventListener('click', handleDownload);
                downloadBtns[i].addEventListener('click', handleDownload);
            }
            for (i = 0; i < cards.length; i++) {
                cards[i].removeEventListener('click', handleCardClick);
                cards[i].addEventListener('click', handleCardClick);
            }
        }

        function handleLike(e) {
            e.stopPropagation();
            var btn = e.currentTarget;
            var id = btn.getAttribute('data-id');
            var img = null;
            for (var i = 0; i < allImages.length; i++) {
                if (allImages[i].id === id) { img = allImages[i]; break; }
            }
            if (img) {
                img.liked = !img.liked;
                render();
            }
        }

        function handleView(e) {
            e.stopPropagation();
            var btn = e.currentTarget;
            var id = btn.getAttribute('data-id');
            openLightbox(id);
        }

        function handleDownload(e) {
            e.stopPropagation();
            var btn = e.currentTarget;
            var id = btn.getAttribute('data-id');
            downloadImageById(id);
        }

        function handleCardClick(e) {
            if (e.target.closest && e.target.closest('.actions')) return;
            var card = e.currentTarget;
            var id = card.getAttribute('data-id');
            openLightbox(id);
        }

        // ===== 灯箱 =====
        function openLightbox(id) {
            var img = null;
            for (var i = 0; i < allImages.length; i++) {
                if (allImages[i].id === id) { img = allImages[i]; break; }
            }
            if (!img) {
                for (var j = 0; j < filteredImages.length; j++) {
                    if (filteredImages[j].id === id) { img = filteredImages[j]; break; }
                }
            }
            if (!img) return;

            currentLightboxId = id;
            lbImage.src = img.url;
            lbImage.alt = img.title;
            lbTitle.textContent = img.title;
            lbSub.textContent = img.categoryLabel + ' · ' + img.author + ' · ' + img.width + '×' + img.height;
            lightbox.className += ' open';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.className = lightbox.className.replace(/\bopen\b/, '');
            document.body.style.overflow = '';
            currentLightboxId = null;
        }

        // 灯箱下载
        function handleLightboxDownload() {
            if (currentLightboxId) {
                downloadImageById(currentLightboxId);
            } else {
                showToast('⚠️ 没有可下载的图片');
            }
        }

        // ===== 事件监听 (灯箱) =====
        lbClose.addEventListener('click', closeLightbox);
        lbDownload.addEventListener('click', function(e) {
            e.stopPropagation();
            handleLightboxDownload();
        });
        lbDownloadBottom.addEventListener('click', function(e) {
            e.stopPropagation();
            handleLightboxDownload();
        });

        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        // ===== 分类切换 =====
        for (var ci = 0; ci < categoryChips.length; ci++) {
            (function(chip) {
                chip.addEventListener('click', function() {
                    for (var c = 0; c < categoryChips.length; c++) {
                        categoryChips[c].className = categoryChips[c].className.replace(/\bactive\b/, '');
                    }
                    this.className += ' active';
                    currentCategory = this.getAttribute('data-category');
                    render();
                });
            })(categoryChips[ci]);
        }

        // ===== 搜索 =====
        function performSearch() {
            searchQuery = searchInput.value;
            render();
        }
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        // ===== 刷新 =====
        refreshBtn.addEventListener('click', function() {
            seed += 7;
            allImages = generateImages(50, seed);
            render();
            var icon = this.querySelector('i');
            icon.style.transform = 'rotate(360deg)';
            setTimeout(function() {
                icon.style.transform = '';
            }, 400);
            showToast('🔄 已刷新，新一批图片加载完成', 1200);
        });

        // ===== 初始化 =====
        allImages = generateImages(50, seed);
        render();
    </script>
</body>
</html>
