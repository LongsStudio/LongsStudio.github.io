<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>错题本 - 丙午马年</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 80px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .view {
            display: none;
        }
        
        .view.active {
            display: block;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: #2ecc71;
            color: white;
        }
        
        .header {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }
        
        .header-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }
        
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:active {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .subject-tabs {
            display: flex;
            background-color: white;
            padding: 10px 15px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid #eee;
            -webkit-overflow-scrolling: touch;
        }
        
        .subject-tab {
            padding: 8px 15px;
            margin-right: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .subject-tab.active {
            background-color: #2ecc71;
            color: white;
        }
        
        .questions-list {
            padding: 20px 15px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ccc;
        }
        
        .question-card {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            height: 120px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .question-card:active {
            transform: scale(0.99);
            background-color: #fafafa;
        }
        
        .question-card.mastered {
            border-left: 5px solid #2ecc71;
        }
        
        .question-card.not-mastered {
            border-left: 5px solid #e74c3c;
        }
        
        .question-image {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
        }
        
        .question-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .question-content {
            flex: 1;
            overflow: hidden;
        }
        
        .question-reason {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }
        
        .question-subject {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .question-date {
            font-size: 0.85rem;
            color: #888;
        }
        
        .question-status {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        
        .status-mastered {
            background-color: rgba(46, 204, 113, 0.15);
            color: #27ae60;
        }
        
        .status-not-mastered {
            background-color: rgba(231, 76, 60, 0.15);
            color: #c0392b;
        }
        
        .add-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.5);
            border: none;
            z-index: 100;
            transition: all 0.3s;
        }
        
        .add-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .add-question-container, .detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .camera-section {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
        
        .camera-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: #333;
        }
        
        .camera-preview {
            width: 100%;
            height: 300px;
            background-color: #222;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }
        
        .camera-controls {
            display: flex;
            gap: 10px;
        }
        
        .camera-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .camera-btn.primary {
            background-color: #2ecc71;
            color: white;
        }
        
        .camera-btn.secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        
        .images-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .image-preview-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-section, .detail-section {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
        
        .form-group, .detail-group {
            margin-bottom: 20px;
        }
        
        .form-label, .detail-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-control, .detail-content {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2ecc71;
        }
        
        .detail-content {
            background-color: #f9f9f9;
            border: none;
        }
        
        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }
        
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        
        .mastery-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        .mastery-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #2ecc71;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .action-btn {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn.save {
            background-color: #2ecc71;
            color: white;
        }
        
        .action-btn.cancel {
            background-color: #e0e0e0;
            color: #333;
        }
        
        .action-btn.delete {
            background-color: #e74c3c;
            color: white;
        }
        
        .chinese { background-color: rgba(241, 196, 15, 0.1); color: #f39c12; }
        .math { background-color: rgba(231, 76, 60, 0.1); color: #c0392b; }
        .english { background-color: rgba(230, 126, 34, 0.1); color: #d35400; }
        .history { background-color: rgba(155, 89, 182, 0.1); color: #8e44ad; }
        .geography { background-color: rgba(52, 152, 219, 0.1); color: #2980b9; }
        .biology { background-color: rgba(46, 204, 113, 0.1); color: #27ae60; }
        .politics { background-color: rgba(22, 160, 133, 0.1); color: #16a085; }
        .physics { background-color: rgba(41, 128, 185, 0.1); color: #2c3e50; }
        .chemistry { background-color: rgba(142, 68, 173, 0.1); color: #8e44ad; }
        .other { background-color: rgba(149, 165, 166, 0.1); color: #7f8c8d; }
        
        .detail-images-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .detail-image-item {
            width: calc(50% - 5px);
            height: 150px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        
        .detail-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }
        
        .detail-image-item:active img {
            transform: scale(1.05);
        }
        
        .detail-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .detail-subject {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* 增强版图片查看器 - 流畅缩放拖拽 */
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.96);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .image-viewer.active {
            display: flex;
            opacity: 1;
        }
        
        .image-viewer-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }
        
        .viewer-image-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .viewer-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.05s linear;
            will-change: transform;
            cursor: grab;
        }
        
        .viewer-image:active {
            cursor: grabbing;
        }
        
        .image-viewer-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        
        .image-viewer-close, .image-viewer-reset {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .image-viewer-close:active, .image-viewer-reset:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        
        .image-viewer-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
        }
        
        .image-viewer-nav-btn {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }
        
        .image-viewer-nav-btn:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        
        .image-viewer-info {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        
        @media (max-width: 600px) {
            .question-card {
                height: 110px;
            }
            .question-image {
                width: 80px;
                height: 80px;
            }
            .camera-preview {
                height: 250px;
            }
            .detail-image-item {
                width: 100%;
                height: 180px;
            }
            .image-viewer-nav-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question-card {
            animation: fadeIn 0.3s ease-out;
        }
        
        .fullscreen-camera {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .fullscreen-camera.active {
            display: flex;
        }
        
        .fullscreen-camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .fullscreen-camera-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }
        
        .fullscreen-camera-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .fullscreen-capture-btn {
            background-color: #fff;
            color: #333;
            width: 70px;
            height: 70px;
        }
        
        .fullscreen-close-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .fullscreen-camera-count {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="main-view" class="view active">
        <header class="header">
            <button class="back-btn" id="main-back-btn"><i class="fas fa-arrow-left"></i></button>
            <h1 class="header-title">错题本</h1>
            <div style="width: 40px;"></div>
        </header>
        <div class="subject-tabs">
            <div class="subject-tab active" data-subject="all">全部</div>
            <div class="subject-tab" data-subject="chinese">语文</div><div class="subject-tab" data-subject="math">数学</div><div class="subject-tab" data-subject="english">英语</div>
            <div class="subject-tab" data-subject="history">历史</div><div class="subject-tab" data-subject="geography">地理</div><div class="subject-tab" data-subject="biology">生物</div>
            <div class="subject-tab" data-subject="politics">政治</div><div class="subject-tab" data-subject="physics">物理</div><div class="subject-tab" data-subject="chemistry">化学</div>
            <div class="subject-tab" data-subject="other">其他</div>
        </div>
        <div class="questions-list" id="questions-list"></div>
        <button class="add-btn" id="add-btn"><i class="fas fa-plus"></i></button>
    </div>
    
    <div id="add-view" class="view">
        <div class="add-question-container">
            <h2 class="add-question-title">添加错题</h2>
            <div class="camera-section">
                <h3 class="camera-title">拍摄错题照片</h3>
                <div class="camera-preview" id="camera-preview"><div id="camera-placeholder"><i class="fas fa-camera" style="font-size: 2.5rem;"></i><p>点击下方按钮开始拍照</p></div><video id="camera-stream" style="display:none;" autoplay playsinline></video><canvas id="camera-canvas" style="display:none;"></canvas></div>
                <div class="camera-controls"><button class="camera-btn primary" id="fullscreen-camera-btn"><i class="fas fa-expand"></i> 全屏拍照</button><button class="camera-btn secondary" id="upload-btn"><i class="fas fa-upload"></i> 上传多图</button></div>
                <div class="images-preview" id="images-preview"></div>
            </div>
            <div class="form-section">
                <div class="form-group"><label class="form-label">科目</label><select class="form-control form-select" id="subject"><option value="chinese">语文</option><option value="math">数学</option><option value="english">英语</option><option value="history">历史</option><option value="geography">地理</option><option value="biology">生物</option><option value="politics">政治</option><option value="physics">物理</option><option value="chemistry">化学</option><option value="other">其他</option></select></div>
                <div class="form-group"><label class="form-label">错误原因</label><textarea class="form-control" id="reason" placeholder="描述错误原因..."></textarea></div>
                <div class="form-group"><label class="form-label">正确答案/解析</label><textarea class="form-control" id="answer" placeholder="填写正确答案或解题思路..."></textarea></div>
                <div class="mastery-section"><div><h3 class="form-label">是否掌握</h3><p style="color:#777; font-size:0.9rem;">标记为已掌握后将不再重点复习</p></div><div class="mastery-toggle"><span id="mastery-status">未掌握</span><label class="toggle-switch"><input type="checkbox" id="mastery-toggle"><span class="toggle-slider"></span></label></div></div>
            </div>
            <div class="action-buttons"><button class="action-btn cancel" id="cancel-btn">取消</button><button class="action-btn save" id="save-btn">保存错题</button></div>
        </div>
    </div>
    
    <div id="detail-view" class="view">
        <div class="detail-container">
            <h2 class="detail-title">错题详情</h2>
            <div class="camera-section"><h3 class="camera-title">错题图片（点击可放大）</h3><div class="detail-images-container" id="detail-images-container"></div></div>
            <div class="detail-section">
                <div class="detail-info"><div><span class="detail-subject" id="detail-subject">语文</span><span class="question-status status-not-mastered" id="detail-mastery">未掌握</span></div><div class="detail-date" id="detail-date"></div></div>
                <div class="detail-group"><label class="detail-label">错误原因</label><div class="detail-content" id="detail-reason"></div></div>
                <div class="detail-group"><label class="detail-label">正确答案/解析</label><div class="detail-content" id="detail-answer"></div></div>
                <div class="mastery-section"><div><h3 class="detail-label">是否掌握</h3><p style="color:#777; font-size:0.9rem;">标记为已掌握后将不再重点复习</p></div><div class="mastery-toggle"><span id="detail-mastery-status">未掌握</span><label class="toggle-switch"><input type="checkbox" id="detail-mastery-toggle"><span class="toggle-slider"></span></label></div></div>
            </div>
            <div class="action-buttons"><button class="action-btn delete" id="delete-btn">删除错题</button><button class="action-btn cancel" id="detail-back-btn">返回</button></div>
        </div>
    </div>
    
    <div id="image-viewer" class="image-viewer">
        <div class="image-viewer-controls"><button class="image-viewer-close" id="image-viewer-close"><i class="fas fa-times"></i></button><button class="image-viewer-reset" id="image-viewer-reset"><i class="fas fa-undo-alt"></i></button></div>
        <div class="image-viewer-nav"><button class="image-viewer-nav-btn" id="image-viewer-prev"><i class="fas fa-chevron-left"></i></button><button class="image-viewer-nav-btn" id="image-viewer-next"><i class="fas fa-chevron-right"></i></button></div>
        <div class="image-viewer-content"><div class="viewer-image-container" id="viewer-image-container"><img id="viewer-image" class="viewer-image" src="" alt="放大图片" draggable="false"></div></div>
        <div class="image-viewer-info"><span id="image-viewer-index">1 / 1</span></div>
    </div>
    
    <div id="fullscreen-camera" class="fullscreen-camera">
        <video id="fullscreen-camera-stream" class="fullscreen-camera-video" autoplay playsinline></video>
        <canvas id="fullscreen-camera-canvas" style="display:none;"></canvas>
        <div class="fullscreen-camera-count" id="fullscreen-camera-count">已拍0张</div>
        <button class="fullscreen-camera-btn fullscreen-close-btn" id="fullscreen-close-btn"><i class="fas fa-times"></i></button>
        <div class="fullscreen-camera-controls"><button class="fullscreen-camera-btn fullscreen-switch-btn" id="fullscreen-switch-btn"><i class="fas fa-sync-alt"></i></button><button class="fullscreen-camera-btn fullscreen-capture-btn" id="fullscreen-capture-btn"><i class="fas fa-camera"></i></button></div>
    </div>

    <script>
        (function(){
            // 数据管理
            class WrongQuestionManager {
                constructor(){
                    this.questions = JSON.parse(localStorage.getItem('wrongQuestions')) || [];
                    if(this.questions.length === 0) this.addSampleData();
                }
                addSampleData(){
                    this.questions = [
                        { id: Date.now(), subject:'math', reason:'三角函数公式应用错误，未注意角度范围', answer:'正确解法：sin(α+β)=sinαcosβ+cosαsinβ，代入得(√2+√6)/4', mastered:false, date:'2026-03-28', images:[] },
                        { id: Date.now()+1, subject:'physics', reason:'动量守恒定律应用错误，未考虑摩擦力', answer:'根据动量守恒，m1v1+m2v2=(m1+m2)v，解得v=2.5m/s', mastered:true, date:'2026-03-25', images:[] }
                    ];
                    this.saveToStorage();
                }
                getAllQuestions(){ return this.questions.sort((a,b)=>b.id-a.id); }
                getQuestionsBySubject(subject){ if(subject==='all') return this.getAllQuestions(); return this.questions.filter(q=>q.subject===subject).sort((a,b)=>b.id-a.id); }
                getQuestionById(id){ return this.questions.find(q=>q.id===parseInt(id)); }
                addQuestion(q){ q.id=Date.now(); q.date=new Date().toISOString().split('T')[0]; this.questions.unshift(q); this.saveToStorage(); return q; }
                updateQuestion(id,updates){ let idx=this.questions.findIndex(q=>q.id===parseInt(id)); if(idx!==-1){ this.questions[idx]={...this.questions[idx],...updates}; this.saveToStorage(); return true; } return false; }
                deleteQuestion(id){ this.questions=this.questions.filter(q=>q.id!==parseInt(id)); this.saveToStorage(); }
                saveToStorage(){ localStorage.setItem('wrongQuestions', JSON.stringify(this.questions)); }
            }
            
            // 优化版图片查看器：流畅双指缩放/拖拽，移除左右滑动切换手势
            class EnhancedImageViewer {
                constructor(){
                    this.viewer = document.getElementById('image-viewer');
                    this.img = document.getElementById('viewer-image');
                    this.container = document.getElementById('viewer-image-container');
                    this.closeBtn = document.getElementById('image-viewer-close');
                    this.resetBtn = document.getElementById('image-viewer-reset');
                    this.prevBtn = document.getElementById('image-viewer-prev');
                    this.nextBtn = document.getElementById('image-viewer-next');
                    this.indexSpan = document.getElementById('image-viewer-index');
                    
                    this.images = [];
                    this.currentIndex = 0;
                    this.scale = 1;
                    this.translateX = 0;
                    this.translateY = 0;
                    this.initialDistance = 0;
                    this.initialScale = 1;
                    this.startX = 0, this.startY = 0;
                    this.isDragging = false;
                    this.isPinching = false;
                    
                    this.initEvents();
                }
                
                initEvents(){
                    this.closeBtn.onclick = () => this.hide();
                    this.resetBtn.onclick = () => this.resetTransform();
                    this.prevBtn.onclick = (e) => { e.stopPropagation(); this.prev(); };
                    this.nextBtn.onclick = (e) => { e.stopPropagation(); this.next(); };
                    this.viewer.addEventListener('click', (e) => { if(e.target === this.viewer) this.hide(); });
                    
                    // 触摸事件 - 仅处理缩放拖拽，不处理切换图片
                    this.img.addEventListener('touchstart', this.onTouchStart.bind(this), { passive: false });
                    this.img.addEventListener('touchmove', this.onTouchMove.bind(this), { passive: false });
                    this.img.addEventListener('touchend', this.onTouchEnd.bind(this));
                    this.img.addEventListener('touchcancel', this.onTouchEnd.bind(this));
                    
                    // 双击复位
                    let lastTap = 0;
                    this.img.addEventListener('touchend', (e) => {
                        let now = Date.now();
                        if(now - lastTap < 300) {
                            e.preventDefault();
                            this.resetTransform();
                        }
                        lastTap = now;
                    });
                }
                
                resetTransform(){
                    this.scale = 1;
                    this.translateX = 0;
                    this.translateY = 0;
                    this.applyTransform();
                }
                
                applyTransform(){
                    this.img.style.transform = `translate(${this.translateX}px, ${this.translateY}px) scale(${this.scale})`;
                }
                
                onTouchStart(e){
                    if(e.touches.length === 1){
                        this.isDragging = true;
                        this.startX = e.touches[0].clientX - this.translateX;
                        this.startY = e.touches[0].clientY - this.translateY;
                    } else if(e.touches.length === 2){
                        this.isPinching = true;
                        this.isDragging = false;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        this.initialDistance = Math.hypot(dx, dy);
                        this.initialScale = this.scale;
                    }
                }
                
                onTouchMove(e){
                    if(this.isPinching && e.touches.length === 2){
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const distance = Math.hypot(dx, dy);
                        if(this.initialDistance > 0){
                            let newScale = this.initialScale * (distance / this.initialDistance);
                            newScale = Math.min(Math.max(newScale, 0.8), 4);
                            this.scale = newScale;
                            this.applyTransform();
                        }
                    } else if(this.isDragging && e.touches.length === 1 && this.scale > 1){
                        e.preventDefault();
                        this.translateX = e.touches[0].clientX - this.startX;
                        this.translateY = e.touches[0].clientY - this.startY;
                        // 边界限制
                        const imgRect = this.img.getBoundingClientRect();
                        const parentRect = this.container.getBoundingClientRect();
                        const maxX = Math.max(0, (imgRect.width * this.scale - parentRect.width) / 2);
                        const maxY = Math.max(0, (imgRect.height * this.scale - parentRect.height) / 2);
                        this.translateX = Math.min(maxX, Math.max(-maxX, this.translateX));
                        this.translateY = Math.min(maxY, Math.max(-maxY, this.translateY));
                        this.applyTransform();
                    }
                }
                
                onTouchEnd(e){
                    if(this.isPinching) this.isPinching = false;
                    if(this.isDragging){
                        this.isDragging = false;
                        // 若图片未缩放，自动将偏移归零
                        if(this.scale === 1){
                            this.translateX = 0;
                            this.translateY = 0;
                            this.applyTransform();
                        }
                    }
                }
                
                show(images, index){
                    this.images = images;
                    this.currentIndex = index;
                    this.resetTransform();
                    this.updateView();
                    this.viewer.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
                
                hide(){
                    this.viewer.classList.remove('active');
                    document.body.style.overflow = '';
                    this.resetTransform();
                }
                
                updateView(){
                    if(!this.images.length) return;
                    this.img.src = this.images[this.currentIndex];
                    this.indexSpan.innerText = `${this.currentIndex+1} / ${this.images.length}`;
                    this.prevBtn.style.display = this.currentIndex > 0 ? 'flex' : 'none';
                    this.nextBtn.style.display = this.currentIndex < this.images.length-1 ? 'flex' : 'none';
                    this.resetTransform();
                }
                
                prev(){
                    if(this.currentIndex > 0){
                        this.currentIndex--;
                        this.updateView();
                    }
                }
                
                next(){
                    if(this.currentIndex < this.images.length-1){
                        this.currentIndex++;
                        this.updateView();
                    }
                }
            }
            
            // 全屏相机类 (保持原有逻辑，略作精简)
            class FullscreenCamera {
                constructor(){
                    this.camera = document.getElementById('fullscreen-camera');
                    this.video = document.getElementById('fullscreen-camera-stream');
                    this.canvas = document.getElementById('fullscreen-camera-canvas');
                    this.closeBtn = document.getElementById('fullscreen-close-btn');
                    this.captureBtn = document.getElementById('fullscreen-capture-btn');
                    this.switchBtn = document.getElementById('fullscreen-switch-btn');
                    this.countDisplay = document.getElementById('fullscreen-camera-count');
                    this.capturedImages = [];
                    this.currentStream = null;
                    this.facingMode = 'environment';
                    this.init();
                }
                init(){
                    this.closeBtn.onclick = () => this.hide();
                    this.captureBtn.onclick = () => this.capture();
                    this.switchBtn.onclick = () => this.switchCamera();
                }
                show(){
                    this.camera.classList.add('active');
                    document.body.style.overflow = 'hidden';
                    this.startCamera();
                }
                hide(){
                    this.stopCamera();
                    this.camera.classList.remove('active');
                    document.body.style.overflow = '';
                }
                startCamera(){
                    if(!navigator.mediaDevices){ alert('浏览器不支持摄像头'); this.hide(); return; }
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: this.facingMode }, audio: false })
                        .then(stream => { this.currentStream = stream; this.video.srcObject = stream; this.video.play(); })
                        .catch(() => { alert('无法访问摄像头'); this.hide(); });
                }
                stopCamera(){
                    if(this.currentStream){ this.currentStream.getTracks().forEach(t => t.stop()); this.currentStream = null; }
                }
                capture(){
                    if(!this.video.srcObject) return;
                    this.canvas.width = this.video.videoWidth;
                    this.canvas.height = this.video.videoHeight;
                    this.canvas.getContext('2d').drawImage(this.video, 0, 0);
                    const imgData = this.canvas.toDataURL('image/jpeg', 0.9);
                    this.capturedImages.push(imgData);
                    this.countDisplay.innerText = `已拍${this.capturedImages.length}张`;
                    this.showFeedback();
                    setTimeout(() => { this.hide(); if(window.viewManager) window.viewManager.addCapturedImages(this.capturedImages); }, 300);
                }
                showFeedback(){
                    let div = document.createElement('div');
                    div.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#2ecc71;font-size:3rem;z-index:20;';
                    div.innerHTML = '<i class="fas fa-check-circle"></i>';
                    this.camera.appendChild(div);
                    setTimeout(() => div.remove(), 500);
                }
                switchCamera(){
                    this.facingMode = this.facingMode === 'environment' ? 'user' : 'environment';
                    this.stopCamera();
                    setTimeout(() => this.startCamera(), 100);
                }
                clearCapturedImages(){ this.capturedImages = []; this.countDisplay.innerText = '已拍0张'; }
                getCapturedImages(){ return this.capturedImages; }
            }
            
            // 视图管理
            class ViewManager {
                constructor(){
                    this.views = {
                        main: document.getElementById('main-view'),
                        add: document.getElementById('add-view'),
                        detail: document.getElementById('detail-view')
                    };
                    this.qm = new WrongQuestionManager();
                    this.imageViewer = new EnhancedImageViewer();
                    this.cameraHelper = new FullscreenCamera();
                    this.currentQuestionId = null;
                    this.capturedImages = [];
                    this.init();
                }
                
                init(){
                    this.showView('main');
                    this.bindEvents();
                    this.renderQuestions();
                    window.viewManager = this;
                }
                
                bindEvents(){
                    // 首页返回箭头：浏览器后退
                    document.getElementById('main-back-btn').onclick = () => { window.history.back(); };
                    document.getElementById('add-btn').onclick = () => this.showView('add');
                    document.getElementById('cancel-btn').onclick = () => this.showView('main');
                    document.getElementById('save-btn').onclick = () => this.saveQuestion();
                    document.getElementById('detail-back-btn').onclick = () => this.showView('main');
                    document.getElementById('delete-btn').onclick = () => { if(confirm('确定删除？')){ this.qm.deleteQuestion(this.currentQuestionId); this.showView('main'); } };
                    document.getElementById('mastery-toggle').onchange = (e) => document.getElementById('mastery-status').innerText = e.target.checked ? '已掌握' : '未掌握';
                    document.getElementById('detail-mastery-toggle').onchange = (e) => {
                        let checked = e.target.checked;
                        document.getElementById('detail-mastery-status').innerText = checked ? '已掌握' : '未掌握';
                        if(this.currentQuestionId) this.qm.updateQuestion(this.currentQuestionId, { mastered: checked });
                        this.renderQuestions();
                    };
                    document.getElementById('fullscreen-camera-btn').onclick = () => this.cameraHelper.show();
                    document.getElementById('upload-btn').onclick = () => this.uploadImages();
                    
                    document.querySelectorAll('.subject-tab').forEach(tab => {
                        tab.onclick = () => {
                            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            this.qm.currentSubject = tab.dataset.subject;
                            this.renderQuestions();
                        };
                    });
                }
                
                renderQuestions(){
                    let listDiv = document.getElementById('questions-list');
                    let questions = this.qm.getQuestionsBySubject(this.qm.currentSubject || 'all');
                    if(!questions.length){
                        listDiv.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list"></i><h3>暂无错题</h3><p>点击+号添加错题</p></div>';
                        return;
                    }
                    listDiv.innerHTML = '';
                    questions.forEach(q => {
                        let card = document.createElement('div');
                        card.className = `question-card ${q.mastered ? 'mastered' : 'not-mastered'}`;
                        let firstImg = (q.images && q.images.length) ? `<img src="${q.images[0]}" alt="错题">` : '<i class="fas fa-image"></i>';
                        card.innerHTML = `
                            <div class="question-image">${firstImg}</div>
                            <div class="question-content">
                                <div class="question-reason">${this.escapeHtml(q.reason)}</div>
                                <div class="question-meta">
                                    <div><span class="question-subject ${this.getSubjectClass(q.subject)}">${this.getSubjectName(q.subject)}</span><span class="question-status ${q.mastered ? 'status-mastered' : 'status-not-mastered'}">${q.mastered ? '已掌握' : '未掌握'}</span></div>
                                    <div class="question-date">${q.date}</div>
                                </div>
                            </div>
                        `;
                        card.onclick = () => { this.currentQuestionId = q.id; this.showView('detail'); this.renderDetailView(); };
                        listDiv.appendChild(card);
                    });
                }
                
                renderDetailView(){
                    let q = this.qm.getQuestionById(this.currentQuestionId);
                    if(!q) return;
                    document.getElementById('detail-subject').innerText = this.getSubjectName(q.subject);
                    document.getElementById('detail-subject').className = `detail-subject ${this.getSubjectClass(q.subject)}`;
                    document.getElementById('detail-date').innerText = q.date;
                    document.getElementById('detail-reason').innerText = q.reason;
                    document.getElementById('detail-answer').innerText = q.answer;
                    let toggle = document.getElementById('detail-mastery-toggle');
                    toggle.checked = q.mastered;
                    document.getElementById('detail-mastery-status').innerText = q.mastered ? '已掌握' : '未掌握';
                    document.getElementById('detail-mastery').innerText = q.mastered ? '已掌握' : '未掌握';
                    let container = document.getElementById('detail-images-container');
                    container.innerHTML = '';
                    if(q.images && q.images.length){
                        q.images.forEach((img, idx) => {
                            let div = document.createElement('div');
                            div.className = 'detail-image-item';
                            div.innerHTML = `<img src="${img}" loading="lazy">`;
                            div.onclick = () => this.imageViewer.show(q.images, idx);
                            container.appendChild(div);
                        });
                    } else {
                        container.innerHTML = '<div style="text-align:center;padding:30px;color:#aaa;"><i class="fas fa-image fa-3x"></i><p>暂无图片</p></div>';
                    }
                }
                
                showView(name){
                    Object.values(this.views).forEach(v => v.classList.remove('active'));
                    this.views[name].classList.add('active');
                    if(name === 'main') this.renderQuestions();
                    else if(name === 'add'){
                        this.capturedImages = [];
                        document.getElementById('images-preview').innerHTML = '';
                        document.getElementById('reason').value = '';
                        document.getElementById('answer').value = '';
                        document.getElementById('mastery-toggle').checked = false;
                        document.getElementById('mastery-status').innerText = '未掌握';
                        this.cameraHelper.clearCapturedImages();
                    } else if(name === 'detail' && this.currentQuestionId) this.renderDetailView();
                }
                
                addCapturedImages(imgs){
                    this.capturedImages.push(...imgs);
                    this.updateImagesPreview();
                }
                
                updateImagesPreview(){
                    let container = document.getElementById('images-preview');
                    container.innerHTML = '';
                    this.capturedImages.forEach((img, i) => {
                        let div = document.createElement('div');
                        div.className = 'image-preview-item';
                        div.innerHTML = `<img src="${img}"><button class="remove-btn" data-idx="${i}">×</button>`;
                        div.querySelector('.remove-btn').onclick = () => { this.capturedImages.splice(i,1); this.updateImagesPreview(); };
                        container.appendChild(div);
                    });
                }
                
                uploadImages(){
                    let input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.multiple = true;
                    input.onchange = e => {
                        let files = Array.from(e.target.files);
                        files.forEach(f => {
                            let reader = new FileReader();
                            reader.onload = ev => { this.capturedImages.push(ev.target.result); this.updateImagesPreview(); };
                            reader.readAsDataURL(f);
                        });
                    };
                    input.click();
                }
                
                saveQuestion(){
                    let reason = document.getElementById('reason').value.trim();
                    let answer = document.getElementById('answer').value.trim();
                    if(!reason || !answer){ alert('请填写完整信息'); return; }
                    this.qm.addQuestion({
                        subject: document.getElementById('subject').value,
                        reason: reason,
                        answer: answer,
                        mastered: document.getElementById('mastery-toggle').checked,
                        images: this.capturedImages
                    });
                    alert('保存成功');
                    this.showView('main');
                }
                
                getSubjectClass(s){
                    const map = { chinese:'chinese', math:'math', english:'english', history:'history', geography:'geography', biology:'biology', politics:'politics', physics:'physics', chemistry:'chemistry' };
                    return map[s] || 'other';
                }
                getSubjectName(s){
                    const map = { chinese:'语文', math:'数学', english:'英语', history:'历史', geography:'地理', biology:'生物', politics:'政治', physics:'物理', chemistry:'化学', other:'其他' };
                    return map[s] || '其他';
                }
                escapeHtml(str){
                    if(!str) return '';
                    return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; });
                }
            }
            
            new ViewManager();
        })();
    </script>
