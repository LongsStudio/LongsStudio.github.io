<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>错题本 - 丙午马年</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除安卓点击高亮 */
        }
        
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 80px;
            -webkit-touch-callout: none; /* 禁止长按菜单 */
            -webkit-user-select: none; /* 禁止文本选择 */
            user-select: none;
        }
        
        /* 通用样式 */
        .view {
            display: none;
        }
        
        .view.active {
            display: block;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background-color: #2ecc71; /* 绿色主题 */
            color: white;
        }
        
        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        
        /* 顶部导航栏 - 绿色主题 */
        .header {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); /* 绿色渐变 */
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }
        
        .header-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }
        
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        /* 科目标签栏 - 绿色主题 */
        .subject-tabs {
            display: flex;
            background-color: white;
            padding: 10px 15px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid #eee;
            -webkit-overflow-scrolling: touch; /* 安卓滚动优化 */
        }
        
        .subject-tab {
            padding: 8px 15px;
            margin-right: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .subject-tab:hover {
            transform: translateY(-2px);
        }
        
        .subject-tab.active {
            background-color: #2ecc71; /* 绿色主题 */
            color: white;
        }
        
        /* 错题列表 */
        .questions-list {
            padding: 20px 15px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ccc;
        }
        
        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #666;
        }
        
        /* 错题卡片 - 改为正方形图片 */
        .question-card {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            height: 120px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .question-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .question-card.mastered {
            border-left: 5px solid #2ecc71; /* 绿色主题 */
        }
        
        .question-card.not-mastered {
            border-left: 5px solid #e74c3c;
        }
        
        /* 正方形图片预览 */
        .question-image {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
        }
        
        /* 正方形图片，使用object-fit: cover填充 */
        .question-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .question-image.has-multiple::after {
            content: '';
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        .question-image.has-multiple[data-count]:after {
            content: attr(data-count);
        }
        
        .question-content {
            flex: 1;
            overflow: hidden;
        }
        
        .question-reason {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }
        
        .question-subject {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .question-date {
            font-size: 0.85rem;
            color: #888;
        }
        
        .question-status {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        
        .status-mastered {
            background-color: rgba(46, 204, 113, 0.15);
            color: #27ae60;
        }
        
        .status-not-mastered {
            background-color: rgba(231, 76, 60, 0.15);
            color: #c0392b;
        }
        
        /* 添加按钮 - 绿色主题 */
        .add-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); /* 绿色渐变 */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.5);
            border: none;
            z-index: 100;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6);
        }
        
        /* 添加错题界面 */
        .add-question-container, .detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .add-question-title, .detail-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #2c3e50;
            text-align: center;
        }
        
        /* 摄像头区域 */
        .camera-section {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
        
        .camera-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: #333;
        }
        
        .camera-preview {
            width: 100%;
            height: 300px;
            background-color: #222;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }
        
        .camera-preview img, .camera-preview video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .camera-controls {
            display: flex;
            gap: 10px;
        }
        
        .camera-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .camera-btn.primary {
            background-color: #2ecc71; /* 绿色主题 */
            color: white;
        }
        
        .camera-btn.secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        
        .camera-btn:hover {
            opacity: 0.9;
        }
        
        /* 图片预览区域 */
        .images-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .image-preview-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-preview-item .remove-btn:hover {
            background-color: #e74c3c;
        }
        
        /* 表单区域 */
        .form-section, .detail-section {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
        
        .form-group, .detail-group {
            margin-bottom: 20px;
        }
        
        .form-label, .detail-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-control, .detail-content {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2ecc71; /* 绿色主题 */
        }
        
        .detail-content {
            background-color: #f9f9f9;
            border: none;
        }
        
        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }
        
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        
        /* 掌握状态 */
        .mastery-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        .mastery-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #2ecc71; /* 绿色主题 */
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .action-btn {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn.save {
            background-color: #2ecc71; /* 绿色主题 */
            color: white;
        }
        
        .action-btn.cancel {
            background-color: #e0e0e0;
            color: #333;
        }
        
        .action-btn.delete {
            background-color: #e74c3c;
            color: white;
        }
        
        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        /* 科目颜色 - 调整为绿色主题相关 */
        .chinese { background-color: rgba(241, 196, 15, 0.1); color: #f39c12; }
        .math { background-color: rgba(231, 76, 60, 0.1); color: #c0392b; }
        .english { background-color: rgba(230, 126, 34, 0.1); color: #d35400; }
        .history { background-color: rgba(155, 89, 182, 0.1); color: #8e44ad; }
        .geography { background-color: rgba(52, 152, 219, 0.1); color: #2980b9; }
        .biology { background-color: rgba(46, 204, 113, 0.1); color: #27ae60; }
        .politics { background-color: rgba(22, 160, 133, 0.1); color: #16a085; }
        .physics { background-color: rgba(41, 128, 185, 0.1); color: #2c3e50; }
        .chemistry { background-color: rgba(142, 68, 173, 0.1); color: #8e44ad; }
        .other { background-color: rgba(149, 165, 166, 0.1); color: #7f8c8d; }
        
        /* 详情页面图片 */
        .detail-images-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .detail-image-item {
            width: calc(50% - 5px);
            height: 150px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        
        .detail-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .detail-image-item img:hover {
            transform: scale(1.05);
        }
        
        .detail-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .detail-subject {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .detail-date {
            font-size: 0.9rem;
            color: #888;
        }
        
        /* 图片放大查看界面 */
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .image-viewer.active {
            display: flex;
        }
        
        .image-viewer img {
            max-width: 100%;
            max-height: 80%;
            object-fit: contain;
            -webkit-user-drag: none;
        }
        
        .image-viewer-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        
        .image-viewer-close {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .image-viewer-info {
            color: white;
            padding: 15px;
            text-align: center;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
        }
        
        .image-viewer-index {
            font-size: 0.9rem;
            color: #ccc;
        }
        
        .image-viewer-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            transform: translateY(-50%);
        }
        
        .image-viewer-nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* 响应式调整 - 针对安卓手机 */
        @media (max-width: 600px) {
            .question-card {
                height: 110px;
            }
            
            .question-image {
                width: 80px;
                height: 80px;
            }
            
            .camera-preview {
                height: 250px;
            }
            
            .camera-controls {
                flex-direction: column;
            }
            
            .detail-image-item {
                width: 100%;
                height: 180px;
            }
            
            .image-preview-item {
                width: 70px;
                height: 70px;
            }
            
            /* 安卓优化 */
            .subject-tab {
                padding: 10px 15px;
            }
            
            .btn, .camera-btn, .action-btn {
                padding: 14px;
                font-size: 1rem;
            }
            
            /* 增加触摸目标大小 */
            .back-btn, .image-viewer-close, .image-viewer-nav-btn {
                width: 50px;
                height: 50px;
            }
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question-card {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* 摄像头状态提示 */
        .camera-status {
            text-align: center;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        /* 针对安卓的优化 */
        @media (hover: none) and (pointer: coarse) {
            /* 移除触摸设备上的hover效果 */
            .question-card:hover {
                transform: none;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            }
            
            .btn:hover, .camera-btn:hover, .action-btn:hover {
                transform: none;
                opacity: 1;
            }
            
            /* 增加触摸反馈 */
            .question-card:active, .subject-tab:active, .btn:active, .camera-btn:active, .action-btn:active {
                opacity: 0.8;
            }
        }
        
        /* 全屏拍照界面 */
        .fullscreen-camera {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .fullscreen-camera.active {
            display: flex;
        }
        
        .fullscreen-camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .fullscreen-camera-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        
        .fullscreen-camera-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .fullscreen-capture-btn {
            background-color: #fff;
            color: #333;
            width: 70px;
            height: 70px;
        }
        
        .fullscreen-close-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .fullscreen-switch-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .fullscreen-camera-btn:hover {
            opacity: 0.9;
        }
        
        .fullscreen-camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        .fullscreen-camera-grid {
            width: 80%;
            height: 80%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            position: relative;
        }
        
        .fullscreen-camera-grid:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%);
        }
        
        .fullscreen-camera-grid:after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateX(-50%);
        }

    <script>
        // 数据管理
        class WrongQuestionManager {
            constructor() {
                this.questions = JSON.parse(localStorage.getItem('wrongQuestions')) || [];
                this.currentSubject = 'all';
                this.init();
            }
            
            init() {
                // 如果没有数据，添加一些示例数据
                if (this.questions.length === 0) {
                    this.addSampleData();
                }
            }
            
            addSampleData() {
                const sampleQuestions = [
                    {
                        id: Date.now(),
                        subject: 'math',
                        reason: '三角函数公式应用错误，未注意角度范围',
                        answer: '正确解法：sin(α+β)=sinαcosβ+cosαsinβ，代入α=30°, β=45°得(√2+√6)/4',
                        mastered: false,
                        date: '2026-03-28',
                        images: []
                    },
                    {
                        id: Date.now() + 1,
                        subject: 'physics',
                        reason: '动量守恒定律应用错误，未考虑摩擦力',
                        answer: '正确解法：根据动量守恒定律，m1v1+m2v2=(m1+m2)v，代入数值计算得v=2.5m/s',
                        mastered: true,
                        date: '2026-03-25',
                        images: []
                    },
                    {
                        id: Date.now() + 2,
                        subject: 'chinese',
                        reason: '文言文翻译不准确，关键词理解错误',
                        answer: '正确翻译："先天下之忧而忧，后天下之乐而乐"应理解为"在天下人忧愁之前先忧愁，在天下人快乐之后才快乐"',
                        mastered: false,
                        date: '2026-03-20',
                        images: []
                    }
                ];
                
                this.questions = sampleQuestions;
                this.saveToStorage();
            }
            
            getAllQuestions() {
                return this.questions.sort((a, b) => b.id - a.id); // 按ID降序排列，最新的在前面
            }
            
            getQuestionsBySubject(subject) {
                if (subject === 'all') {
                    return this.getAllQuestions();
                }
                return this.questions.filter(q => q.subject === subject).sort((a, b) => b.id - a.id);
            }
            
            getQuestionById(id) {
                return this.questions.find(q => q.id === parseInt(id));
            }
            
            addQuestion(question) {
                question.id = Date.now();
                question.date = new Date().toISOString().split('T')[0]; // 格式化为YYYY-MM-DD
                this.questions.unshift(question); // 添加到数组开头
                this.saveToStorage();
                return question;
            }
            
            updateQuestion(id, updates) {
                const index = this.questions.findIndex(q => q.id === parseInt(id));
                if (index !== -1) {
                    this.questions[index] = { ...this.questions[index], ...updates };
                    this.saveToStorage();
                    return true;
                }
                return false;
            }
            
            deleteQuestion(id) {
                this.questions = this.questions.filter(q => q.id !== parseInt(id));
                this.saveToStorage();
            }
            
            saveToStorage() {
                localStorage.setItem('wrongQuestions', JSON.stringify(this.questions));
            }
        }
        
        // 图片查看器
        class ImageViewer {
            constructor() {
                this.viewer = document.getElementById('image-viewer');
                this.viewerImage = document.getElementById('viewer-image');
                this.viewerClose = document.getElementById('image-viewer-close');
                this.viewerPrev = document.getElementById('image-viewer-prev');
                this.viewerNext = document.getElementById('image-viewer-next');
                this.viewerIndex = document.getElementById('image-viewer-index');
                
                this.currentImages = [];
                this.currentIndex = 0;
                
                this.init();
            }
            
            init() {
                // 关闭查看器
                this.viewerClose.addEventListener('click', () => {
                    this.hide();
                });
                
                // 点击背景关闭
                this.viewer.addEventListener('click', (e) => {
                    if (e.target === this.viewer) {
                        this.hide();
                    }
                });
                
                // 上一张
                this.viewerPrev.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.prev();
                });
                
                // 下一张
                this.viewerNext.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.next();
                });
                
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (!this.viewer.classList.contains('active')) return;
                    
                    if (e.key === 'Escape' || e.key === 'Esc') {
                        this.hide();
                    } else if (e.key === 'ArrowLeft') {
                        this.prev();
                    } else if (e.key === 'ArrowRight') {
                        this.next();
                    }
                });
                
                // 触摸手势支持
                let touchStartX = 0;
                let touchStartY = 0;
                
                this.viewer.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });
                
                this.viewer.addEventListener('touchend', (e) => {
                    if (!touchStartX) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    
                    const diffX = touchStartX - touchEndX;
                    const diffY = touchStartY - touchEndY;
                    
                    // 如果是水平滑动且垂直移动不大
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) {
                        if (diffX > 0) {
                            // 向左滑动，下一张
                            this.next();
                        } else {
                            // 向右滑动，上一张
                            this.prev();
                        }
                    }
                    
                    touchStartX = 0;
                    touchStartY = 0;
                });
                
                // 双击放大/缩小
                let lastTap = 0;
                this.viewerImage.addEventListener('touchend', (e) => {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    
                    if (tapLength < 300 && tapLength > 0) {
                        // 双击事件
                        this.toggleZoom();
                        e.preventDefault();
                    }
                    
                    lastTap = currentTime;
                });
            }
            
            show(images, index = 0) {
                this.currentImages = images;
                this.currentIndex = index;
                this.updateView();
                this.viewer.classList.add('active');
                document.body.style.overflow = 'hidden'; // 防止背景滚动
            }
            
            hide() {
                this.viewer.classList.remove('active');
                document.body.style.overflow = ''; // 恢复滚动
            }
            
            updateView() {
                if (this.currentImages.length === 0) return;
                
                this.viewerImage.src = this.currentImages[this.currentIndex];
                this.viewerIndex.textContent = `${this.currentIndex + 1} / ${this.currentImages.length}`;
                
                // 控制导航按钮显示
                this.viewerPrev.style.display = this.currentIndex > 0 ? 'flex' : 'none';
                this.viewerNext.style.display = this.currentIndex < this.currentImages.length - 1 ? 'flex' : 'none';
            }
            
            prev() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.updateView();
                }
            }
            
            next() {
                if (this.currentIndex < this.currentImages.length - 1) {
                    this.currentIndex++;
                    this.updateView();
                }
            }
            
            toggleZoom() {
                const img = this.viewerImage;
                if (img.style.transform === 'scale(1.5)') {
                    img.style.transform = 'scale(1)';
                } else {
                    img.style.transform = 'scale(1.5)';
                }
            }
        }
        
        // 全屏拍照管理器
        class FullscreenCamera {
            constructor() {
                this.camera = document.getElementById('fullscreen-camera');
                this.video = document.getElementById('fullscreen-camera-stream');
                this.canvas = document.getElementById('fullscreen-camera-canvas');
                this.closeBtn = document.getElementById('fullscreen-close-btn');
                this.captureBtn = document.getElementById('fullscreen-capture-btn');
                this.switchBtn = document.getElementById('fullscreen-switch-btn');
                this.countDisplay = document.getElementById('fullscreen-camera-count');
                
                this.capturedImages = [];
                this.currentStream = null;
                this.facingMode = 'environment'; // 默认后置摄像头
                
                this.init();
            }
            
            init() {
                // 关闭按钮
                this.closeBtn.addEventListener('click', () => {
                    this.hide();
                });
                
                // 拍照按钮
                this.captureBtn.addEventListener('click', () => {
                    this.capture();
                });
                
                // 切换摄像头按钮
                this.switchBtn.addEventListener('click', () => {
                    this.switchCamera();
                });
            }
            
            show() {
                this.camera.classList.add('active');
                document.body.style.overflow = 'hidden';
                this.startCamera();
            }
            
            hide() {
                this.stopCamera();
                this.camera.classList.remove('active');
                document.body.style.overflow = '';
            }
            
            startCamera() {
                // 检查浏览器是否支持媒体设备
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('您的浏览器不支持摄像头功能，请使用上传图片功能');
                    this.hide();
                    return;
                }
                
                // 获取摄像头权限
                const constraints = {
                    video: { 
                        facingMode: this.facingMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };
                
                navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    this.currentStream = stream;
                    this.video.srcObject = stream;
                    
                    // 播放视频流
                    this.video.play().catch(err => {
                        console.error('播放视频流失败:', err);
                        alert('播放视频流失败，请检查摄像头权限');
                        this.hide();
                    });
                })
                .catch(err => {
                    console.error("摄像头访问错误: ", err);
                    alert("无法访问摄像头，请检查权限设置或尝试使用上传图片功能。");
                    this.hide();
                });
            }
            
            stopCamera() {
                if (this.currentStream) {
                    this.currentStream.getTracks().forEach(track => {
                        track.stop();
                    });
                    this.currentStream = null;
                }
            }
            
            capture() {
                if (!this.video.srcObject) {
                    alert('摄像头未启动');
                    return;
                }
                
                const context = this.canvas.getContext('2d');
                
                // 设置canvas尺寸与视频流一致
                this.canvas.width = this.video.videoWidth;
                this.canvas.height = this.video.videoHeight;
                
                // 绘制当前视频帧到canvas
                context.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                
                // 将canvas内容转换为图片
                const imageData = this.canvas.toDataURL('image/jpeg', 0.9);
                
                // 将图片添加到数组中
                this.capturedImages.push(imageData);
                
                // 更新计数显示
                this.updateCount();
                
                // 显示拍照成功提示
                this.showCaptureFeedback();
                
                // 自动返回添加界面
                setTimeout(() => {
                    this.hide();
                    // 将拍摄的图片传递给主应用
                    if (window.viewManager) {
                        window.viewManager.addCapturedImages(this.capturedImages);
                    }
                }, 1000);
            }
            
            updateCount() {
                this.countDisplay.textContent = `已拍${this.capturedImages.length}张`;
            }
            
            showCaptureFeedback() {
                // 显示拍照成功动画
                const overlay = document.createElement('div');
                overlay.style.position = 'absolute';
                overlay.style.top = '0';
                overlay.style.left = '0';
                overlay.style.width = '100%';
                overlay.style.height = '100%';
                overlay.style.backgroundColor = 'white';
                overlay.style.opacity = '0.8';
                overlay.style.zIndex = '5';
                overlay.style.display = 'flex';
                overlay.style.alignItems = 'center';
                overlay.style.justifyContent = 'center';
                overlay.style.fontSize = '2rem';
                overlay.style.color = '#2ecc71';
                
                const checkIcon = document.createElement('i');
                checkIcon.className = 'fas fa-check-circle';
                checkIcon.style.fontSize = '4rem';
                
                overlay.appendChild(checkIcon);
                this.camera.appendChild(overlay);
                
                // 1秒后移除动画
                setTimeout(() => {
                    if (overlay.parentNode) {
                        overlay.remove();
                    }
                }, 1000);
            }
            
            switchCamera() {
                // 切换前后摄像头
                this.facingMode = this.facingMode === 'environment' ? 'user' : 'environment';
                
                // 停止当前摄像头
                this.stopCamera();
                
                // 重新启动摄像头
                setTimeout(() => {
                    this.startCamera();
                }, 100);
            }
            
            getCapturedImages() {
                return this.capturedImages;
            }
            
            clearCapturedImages() {
                this.capturedImages = [];
                this.updateCount();
            }
        }
        
        // 视图管理
        class ViewManager {
            constructor() {
                this.views = {
                    main: document.getElementById('main-view'),
                    add: document.getElementById('add-view'),
                    detail: document.getElementById('detail-view')
                };
                
                this.questionManager = new WrongQuestionManager();
                this.imageViewer = new ImageViewer();
                this.fullscreenCamera = new FullscreenCamera();
                this.currentQuestionId = null;
                this.capturedImages = [];
                this.init();
            }
            
            init() {
                this.showView('main');
                this.setupEventListeners();
                this.renderQuestions();
                
                // 将实例暴露给全局，供全屏相机调用
                window.viewManager = this;
            }
            
            showView(viewName) {
                // 隐藏所有视图
                Object.values(this.views).forEach(view => {
                    view.classList.remove('active');
                });
                
                // 显示指定视图
                if (this.views[viewName]) {
                    this.views[viewName].classList.add('active');
                    
                    // 视图特定的初始化
                    if (viewName === 'main') {
                        this.renderQuestions();
                    } else if (viewName === 'add') {
                        this.initAddView();
                    } else if (viewName === 'detail' && this.currentQuestionId) {
                        this.renderDetailView();
                    }
                }
            }
            
            setupEventListeners() {
                // 主界面事件
                document.getElementById('add-btn').addEventListener('click', () => {
                    this.showView('add');
                });
                
                // 返回按钮 - 跳转到上一页
                document.getElementById('main-back-btn').addEventListener('click', () => {
                    if (document.referrer && document.referrer.includes(window.location.host)) {
                        window.history.back();
                    } else {
                        // 如果没有上一页，显示提示
                        alert('已经是第一页了');
                    }
                });
                
                // 科目标签事件
                document.querySelectorAll('.subject-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        // 移除所有active类
                        document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
                        // 添加active类到当前标签
                        tab.classList.add('active');
                        // 筛选错题
                        const subject = tab.dataset.subject;
                        this.questionManager.currentSubject = subject;
                        this.renderQuestions();
                    });
                });
                
                // 添加界面事件
                document.getElementById('cancel-btn').addEventListener('click', () => {
                    this.showView('main');
                });
                
                document.getElementById('save-btn').addEventListener('click', () => {
                    this.saveQuestion();
                });
                
                // 详情界面事件
                document.getElementById('detail-back-btn').addEventListener('click', () => {
                    this.showView('main');
                });
                
                document.getElementById('delete-btn').addEventListener('click', () => {
                    if (confirm('确定要删除这道错题吗？此操作不可撤销。')) {
                        this.questionManager.deleteQuestion(this.currentQuestionId);
                        this.showView('main');
                    }
                });
                
                // 掌握状态切换
                document.getElementById('mastery-toggle').addEventListener('change', (e) => {
                    document.getElementById('mastery-status').textContent = e.target.checked ? '已掌握' : '未掌握';
                });
                
                document.getElementById('detail-mastery-toggle').addEventListener('change', (e) => {
                    document.getElementById('detail-mastery-status').textContent = e.target.checked ? '已掌握' : '未掌握';
                    
                    // 更新数据
                    if (this.currentQuestionId) {
                        this.questionManager.updateQuestion(this.currentQuestionId, {
                            mastered: e.target.checked
                        });
                        
                        // 更新主界面
                        this.renderQuestions();
                    }
                });
                
                // 摄像头事件
                document.getElementById('fullscreen-camera-btn').addEventListener('click', () => {
                    this.fullscreenCamera.show();
                });
                
                document.getElementById('upload-btn').addEventListener('click', () => {
                    this.uploadImages();
                });
            }
            
            renderQuestions() {
                const subject = this.questionManager.currentSubject;
                const questions = this.questionManager.getQuestionsBySubject(subject);
                const questionsList = document.getElementById('questions-list');
                
                if (questions.length === 0) {
                    questionsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-clipboard-list"></i>
                            <h3>暂无错题</h3>
                            <p>点击下方+号按钮添加你的第一道错题</p>
                        </div>
                    `;
                    return;
                }
                
                questionsList.innerHTML = '';
                
                questions.forEach(question => {
                    const questionCard = this.createQuestionCard(question);
                    questionsList.appendChild(questionCard);
                });
            }
            
            createQuestionCard(question) {
                const card = document.createElement('div');
                card.className = `question-card ${question.mastered ? 'mastered' : 'not-mastered'}`;
                card.dataset.id = question.id;
                
                // 格式化日期
                const dateStr = question.date;
                
                // 创建科目标签
                const subjectClass = this.getSubjectClass(question.subject);
                const subjectName = this.getSubjectName(question.subject);
                
                // 图片预览 - 使用正方形
                let imagePreview = '<i class="fas fa-image"></i>';
                let imageCount = 0;
                
                if (question.images && question.images.length > 0) {
                    imagePreview = `<img src="${question.images[0]}" alt="错题图片">`;
                    imageCount = question.images.length;
                }
                
                card.innerHTML = `
                    <div class="question-image ${imageCount > 1 ? 'has-multiple' : ''}" ${imageCount > 1 ? `data-count="${imageCount}"` : ''}>
                        ${imagePreview}
                    </div>
                    <div class="question-content">
                        <div class="question-reason">${question.reason}</div>
                        <div class="question-meta">
                            <div>
                                <span class="question-subject ${subjectClass}">${subjectName}</span>
                                <span class="question-status ${question.mastered ? 'status-mastered' : 'status-not-mastered'}">
                                    ${question.mastered ? '已掌握' : '未掌握'}
                                </span>
                            </div>
                            <div class="question-date">${dateStr}</div>
                        </div>
                    </div>
                `;
                
                // 点击卡片进入详情页
                card.addEventListener('click', () => {
                    this.currentQuestionId = question.id;
                    this.showView('detail');
                });
                
                return card;
            }
            
            initAddView() {
                // 重置表单
                document.getElementById('subject').value = 'chinese';
                document.getElementById('reason').value = '';
                document.getElementById('answer').value = '';
                document.getElementById('mastery-toggle').checked = false;
                document.getElementById('mastery-status').textContent = '未掌握';
                
                // 重置图片数组
                this.capturedImages = [];
                this.updateImagesPreview();
                
                // 清空全屏相机的图片
                this.fullscreenCamera.clearCapturedImages();
            }
            
            addCapturedImages(images) {
                // 从全屏相机添加图片
                this.capturedImages = [...this.capturedImages, ...images];
                this.updateImagesPreview();
                
                // 显示提示
                this.showMessage(`已添加${images.length}张图片，共${this.capturedImages.length}张`);
            }
            
            showMessage(message) {
                // 移除之前的消息
                const existingMessage = document.querySelector('.camera-status');
                if (existingMessage) {
                    existingMessage.remove();
                }
                
                // 创建新消息
                const messageDiv = document.createElement('div');
                messageDiv.className = 'camera-status';
                messageDiv.textContent = message;
                
                // 插入到摄像头预览区域
                const cameraPreview = document.getElementById('camera-preview');
                cameraPreview.appendChild(messageDiv);
                
                // 3秒后自动消失
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.remove();
                    }
                }, 3000);
            }
            
            uploadImages() {
                // 创建文件输入元素
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.multiple = true; // 允许多选
                
                fileInput.onchange = (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) return;
                    
                    let loadedCount = 0;
                    
                    files.forEach(file => {
                        if (!file.type.startsWith('image/')) {
                            alert(`文件 ${file.name} 不是图片文件，已跳过`);
                            return;
                        }
                        
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.capturedImages.push(event.target.result);
                            loadedCount++;
                            
                            // 所有文件加载完成后更新预览
                            if (loadedCount === files.length) {
                                this.updateImagesPreview();
                                this.showMessage(`成功上传 ${files.length} 张图片`);
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                };
                
                fileInput.click();
            }
            
            updateImagesPreview() {
                const imagesPreview = document.getElementById('images-preview');
                imagesPreview.innerHTML = '';
                
                // 显示已拍摄/上传的图片
                this.capturedImages.forEach((image, index) => {
                    const imageItem = document.createElement('div');
                    imageItem.className = 'image-preview-item';
                    imageItem.innerHTML = `
                        <img src="${image}" alt="错题图片 ${index + 1}">
                        <button class="remove-btn" data-index="${index}">×</button>
                    `;
                    
                    // 添加删除按钮事件
                    const removeBtn = imageItem.querySelector('.remove-btn');
                    removeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.removeImage(index);
                    });
                    
                    imagesPreview.appendChild(imageItem);
                });
            }
            
            removeImage(index) {
                this.capturedImages.splice(index, 1);
                this.updateImagesPreview();
            }
            
            saveQuestion() {
                const subject = document.getElementById('subject').value;
                const reason = document.getElementById('reason').value.trim();
                const answer = document.getElementById('answer').value.trim();
                const mastered = document.getElementById('mastery-toggle').checked;
                
                if (!reason) {
                    alert('请填写错误原因');
                    return;
                }
                
                if (!answer) {
                    alert('请填写正确答案或解析');
                    return;
                }
                
                if (this.capturedImages.length === 0) {
                    if (!confirm('您没有上传错题图片，确定要继续保存吗？')) {
                        return;
                    }
                }
                
                const newQuestion = {
                    subject,
                    reason,
                    answer,
                    mastered,
                    images: this.capturedImages
                };
                
                this.questionManager.addQuestion(newQuestion);
                alert('错题保存成功！');
                
                // 返回主界面
                this.showView('main');
            }
            
            renderDetailView() {
                if (!this.currentQuestionId) return;
                
                const question = this.questionManager.getQuestionById(this.currentQuestionId);
                if (!question) return;
                
                // 设置科目
                const subjectClass = this.getSubjectClass(question.subject);
                const subjectName = this.getSubjectName(question.subject);
                document.getElementById('detail-subject').className = `detail-subject ${subjectClass}`;
                document.getElementById('detail-subject').textContent = subjectName;
                
                // 设置日期
                document.getElementById('detail-date').textContent = question.date;
                
                // 设置错误原因
                document.getElementById('detail-reason').textContent = question.reason;
                
                // 设置答案
                document.getElementById('detail-answer').textContent = question.answer;
                
                // 设置掌握状态
                const masteryToggle = document.getElementById('detail-mastery-toggle');
                const masteryStatus = document.getElementById('detail-mastery-status');
                const masteryBadge = document.getElementById('detail-mastery');
                
                masteryToggle.checked = question.mastered;
                masteryStatus.textContent = question.mastered ? '已掌握' : '未掌握';
                masteryBadge.textContent = question.mastered ? '已掌握' : '未掌握';
                masteryBadge.className = `question-status ${question.mastered ? 'status-mastered' : 'status-not-mastered'}`;
                
                // 设置图片
                const imagesContainer = document.getElementById('detail-images-container');
                imagesContainer.innerHTML = '';
                
                if (question.images && question.images.length > 0) {
                    question.images.forEach((image, index) => {
                        const imageItem = document.createElement('div');
                        imageItem.className = 'detail-image-item';
                        imageItem.innerHTML = `<img src="${image}" alt="错题图片 ${index + 1}" data-index="${index}">`;
                        
                        // 添加点击事件，打开图片查看器
                        imageItem.addEventListener('click', () => {
                            this.imageViewer.show(question.images, index);
                        });
                        
                        imagesContainer.appendChild(imageItem);
                    });
                } else {
                    imagesContainer.innerHTML = `
                        <div style="width:100%; text-align:center; padding:30px; color:#aaa;">
                            <i class="fas fa-image" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <p>暂无错题图片</p>
                        </div>
                    `;
                }
            }
            
            getSubjectClass(subject) {
                const subjectClasses = {
                    chinese: 'chinese',
                    math: 'math',
                    english: 'english',
                    history: 'history',
                    geography: 'geography',
                    biology: 'biology',
                    politics: 'politics',
                    physics: 'physics',
                    chemistry: 'chemistry',
                    other: 'other'
                };
                return subjectClasses[subject] || 'other';
            }
            
            getSubjectName(subject) {
                const subjectNames = {
                    chinese: '语文',
                    math: '数学',
                    english: '英语',
                    history: '历史',
                    geography: '地理',
                    biology: '生物',
                    politics: '政治',
                    physics: '物理',
                    chemistry: '化学',
                    other: '其他'
                };
                return subjectNames[subject] || '其他';
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new ViewManager();
        });
    </script>
</body>
</html>
