<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>智慧白板 · 一周年庆典</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei",sans-serif;
}
body{
    background:#000;
    min-height:100vh;
    padding:40px 20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(57,255,57,0.25) 0%, transparent 65%);
    animation: rotateGlow 8s linear infinite;
    z-index:0;
}
@keyframes rotateGlow{
    0%{transform:translate(-10%,-10%) rotate(0deg);}
    100%{transform:translate(-10%,-10%) rotate(360deg);}
}
.wrap{
    position:relative;
    z-index:1;
    max-width:900px;
}
.logo{
    width:clamp(70px,14vw,140px);
    height:auto;
    margin-bottom: 18px;
    animation: bounce 2.5s ease-in-out infinite;
}
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}
h1{
    font-size:clamp(1.4rem,5vw,3rem);
    color:#39ff39;
    letter-spacing:2px;
    margin-bottom:10px;
}
.sub-title{
    font-size:clamp(0.9rem,2vw,1.5rem);
    color:#cfffcf;
    margin-bottom:24px;
}
.desc{
    font-size:clamp(0.8rem,1.5vw,1.1rem);
    color:#a8ffa8;
    line-height:1.8;
}
.tag{
    display:inline-block;
    margin-top:32px;
    padding:10px 34px;
    border:2px solid #39ff39;
    color:#39ff39;
    font-size:clamp(0.9rem,2vw,1.15rem);
    border-radius:999px;
    transition:0.3s ease;
}
.tag:hover{
    background:#39ff39;
    color:#000;
}
</style>
</head>
<body>
<div class="wrap">
    <img class="logo" src="https://longsstudio.github.io/zhbbtb.png" alt="智慧白板logo">
    <h1>智慧白板 · 一周年庆典</h1>
    <p class="sub-title">相伴一载，智启新程</p>
    <p class="desc">
        感谢每一位用户一路相伴！<br>
        一年深耕，不断优化课堂交互、白板书写、课件演示功能。<br>
        未来继续打造流畅好用的智慧教学工具，与大家携手前行！
    </p>
    <div class="tag">周年活动火热即将开启</div>
</div>
</body>
</html>
