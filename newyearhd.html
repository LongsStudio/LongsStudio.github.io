<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧白板 - 智能对话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            background: linear-gradient(90deg, #0066cc 0%, #003366 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-content {
            flex: 1;
        }
        
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        /* 语音开关样式 */
        .voice-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 20px;
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .voice-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .voice-toggle.active {
            background: rgba(255, 255, 255, 0.4);
        }
        
        .voice-icon {
            font-size: 1.1rem;
        }
        
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background-color: #0066cc;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message {
            background-color: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        /* 预设问题区域新样式 - 移至输入区上方 */
        .preset-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px 8px 20px;
            background-color: #f9fafc;
            border-top: 1px solid #eee;
            justify-content: center;
        }
        
        .preset-btn {
            background-color: #e6f2ff;
            color: #0066cc;
            border: 1px solid #b3d9ff;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .preset-btn:hover {
            background-color: #0066cc;
            color: white;
        }
        
        .input-area {
            padding: 8px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 修改后的输入行布局：发送按钮在左，输入框在中，加号在右 */
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        /* 发送按钮移至左侧 */
        button#sendButton {
            background: linear-gradient(90deg, #0066cc 0%, #003366 100%);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            height: 50px;
            flex-shrink: 0;
        }
        
        button#sendButton:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        button#sendButton:active {
            transform: scale(0.98);
        }
        
        /* 文本输入框 */
        input#userInput {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        
        input#userInput:focus {
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.2);
        }
        
        /* 文件上传按钮样式 - 改为加号 */
        .file-upload-btn {
            background-color: #f0f2f5;
            color: #666;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        
        .file-upload-btn:hover {
            background-color: #e6f2ff;
            border-color: #0066cc;
            color: #0066cc;
        }
        
        .file-upload-btn input[type="file"] {
            display: none;
        }
        
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: #f0f2f5;
            color: #666;
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #999;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        
        .image-generation {
            background-color: #e6f7ff;
            border-left: 4px solid #0066cc;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
        }
        
        .error-message {
            background-color: #fff2f0;
            border-left: 4px solid #ff4d4f;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
        }
        
        /* 文件信息预览样式 */
        .file-info {
            padding: 8px 12px;
            background-color: #f9f9f9;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #555;
            border: 1px dashed #ccc;
            margin-top: 5px;
            display: none; /* 默认隐藏，有文件时显示 */
        }
        
        .file-info span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-info .file-name {
            font-weight: 600;
            color: #0066cc;
        }
        
        .remove-file {
            color: #ff4d4f;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            .container {
                height: 90vh;
                border-radius: 10px;
            }
            
            .header {
                padding: 15px 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .voice-toggle {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .message {
                max-width: 90%;
            }
            
            .preset-questions {
                padding: 10px 15px 6px 15px;
            }
            
            .preset-btn {
                font-size: 0.75rem;
                padding: 5px 10px;
            }
            
            .input-area {
                padding: 8px 15px 15px 15px;
            }
            
            button#sendButton {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

            </button>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot-message">
                您好！我是智慧白板，您的智能对话助手。我可以回答各种问题，提供信息，甚至尝试为您生成图片。现在我还支持上传图片和文件，并且可以语音播报回复！请问有什么可以帮您的？
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>

        <!-- 预设问题区域已移至输入区域上方 -->
        <div class="preset-questions" id="presetQuestions">

            <div class="preset-btn" data-question="生成一张风景图片">生成图片</div>
            <div class="preset-btn" data-question="今天天气怎么样">天气查询</div>
            <div class="preset-btn" data-question="现在几点了">时间查询</div>

        </div>
        
        <div class="input-area">

            <div class="file-info" id="fileInfo">
                <span>已选择文件: <span class="file-name" id="fileName"></span><span class="remove-file" id="removeFile">× 移除</span></span>
            </div>
            
            <div class="input-row">
                <!-- 发送按钮在左侧 -->
                <button id="sendButton">发送</button>
                
                <!-- 文本输入框在中间 -->
                <input type="text" id="userInput" placeholder="输入您的问题或指令，或上传文件..." autocomplete="off">
                
                <!-- 文件上传按钮改为加号，在右侧 -->
                <label class="file-upload-btn" for="fileUpload" title="上传图片或文件">
                    +
                    <input type="file" id="fileUpload" accept="image/*,.pdf,.doc,.docx,.txt">
                </label>
            </div>
        </div>
    </div>

    <script>
        // 语音功能全局状态
        let voiceEnabled = false;
        let speechSynthesis = window.speechSynthesis;
        
        // 扩展的预设问答知识库
        const knowledgeBase = [
            {
                keywords: ["你好", "hello", "hi", "您好", "嗨", "早上好", "下午好", "晚上好"],
                response: "您好！我是智慧白板，很高兴为您服务。有什么可以帮您的吗？"
            },
            {
                keywords: ["名字", "称呼", "你叫什么", "你是谁", "身份"],
                response: "我是智慧白板，您的智能对话助手。我可以回答各种问题，提供信息和帮助，现在还支持上传文件哦。"
            },
            {
                keywords: ["功能", "能做什么", "你会什么", "做什么", "能力", "擅长"],
                response: "我可以回答关于时间、天气、日期、计算、常识等方面的问题。我还可以尝试生成图片，讲笑话，提供建议等。现在新增了文件上传和语音播报功能，您可以发送图片或文档给我，并可以听到我的语音回复。"
            },
            {
                keywords: ["时间", "几点", "现在几点", "当前时间", "钟点", "日期", "今天几号", "星期几"],
                response: function() {
                    const now = new Date();
                    const days = ["日", "一", "二", "三", "四", "五", "六"];
                    const months = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
                    return `现在时间是 ${now.getHours()}点${now.getMinutes()}分${now.getSeconds()}秒。今天是${now.getFullYear()}年${months[now.getMonth()]}${now.getDate()}日，星期${days[now.getDay()]}。`;
                }
            },
            {

                    if (hasMath) {

                keywords: ["默认", "不知道", "不了解", "不清楚", "不明白"],
                response: "服务器繁忙，请稍后重试。"
            }
        ];

        // 语音播报功能
        function speakText(text) {
            if (!voiceEnabled || !speechSynthesis) return;
            
            // 停止当前可能正在进行的语音
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            speechSynthesis.speak(utterance);
        }
        
        // 切换语音开关
        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            const toggleBtn = document.getElementById('voiceToggle');
            const voiceIcon = toggleBtn.querySelector('.voice-icon');
            const voiceText = toggleBtn.querySelector('.voice-text');
            
            if (voiceEnabled) {
                toggleBtn.classList.add('active');
                voiceIcon.textContent = '🔊';
                voiceText.textContent = '';
                // 测试语音
                speakText("语音播报功能已开启");
            } else {
                toggleBtn.classList.remove('active');
                voiceIcon.textContent = '🔇';
                voiceText.textContent = '';
                speechSynthesis.cancel();
            }
        }

        // 过滤语气词，提取关键词
        function extractKeywords(text) {
            const filteredText = text.toLowerCase()
                .replace(/[啊呀呢吧嘛哦啦咦哎哟呵嗯呐噢唉哈啰呗哩咯哟]/g, '')
                .replace(/[,.!?;，。！？；]/g, '')
                .trim();
            
            const words = filteredText.split(/\s+/);
            
            const stopWords = ["的", "了", "在", "是", "我", "有", "和", "就", "不", "人", "都", "一", "个", "上", "也", "很", "到", "说", "要", "去", "你", "会", "着", "没有", "看", "好", "自己", "这", "那", "就", "还", "把", "又", "什么", "怎么", "如何", "为什么"];
            
            return words.filter(word => 
                word.length > 0 && 
                !stopWords.includes(word) &&
                word.length <= 8
            );
        }

        // 在知识库中查找匹配的回答
        function findResponse(userInput) {
            const keywords = extractKeywords(userInput);
            
            if (keywords.length === 0) {
                return "抱歉，我没有理解您的问题。您可以尝试更清楚地表达您的问题。";
            }
            
            let bestMatch = null;
            let highestScore = 0;
            
            for (const item of knowledgeBase) {
                let score = 0;
                
                for (const keyword of keywords) {
                    for (const pattern of item.keywords) {
                        if (keyword.includes(pattern) || pattern.includes(keyword)) {
                            score += 3;
                        } else if (keyword.toLowerCase().includes(pattern.toLowerCase()) || 
                                  pattern.toLowerCase().includes(keyword.toLowerCase())) {
                            score += 1;
                        }
                    }
                }
                
                if (score > highestScore) {
                    highestScore = score;
                    bestMatch = item;
                }
            }
            
            if (highestScore > 2) {
                if (bestMatch.response === "image_generation") {
                    return "image_generation";
                } else if (typeof bestMatch.response === 'function') {
                    return bestMatch.response(userInput);
                }
                return bestMatch.response;
            } else {
                const random = Math.random();
                if (random < 0.6) {
                    return "抱歉，我还在学习中，暂时无法回答这个问题。您可以尝试问其他问题，比如时间、天气或功能说明。";
                } else {
                    return "服务器繁忙，请稍后重试。";
                }
            }
        }

        // 处理图片生成相关请求
        function handleImageGeneration() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const responses = [
                        "正在生成图片中，请稍候...",
                        "图片生成遇到问题，服务器错误，请重新尝试。",
                        "图片生成服务暂时不可用，请稍后再试。"
                    ];
                    const randomIndex = Math.floor(Math.random() * responses.length);
                    resolve(responses[randomIndex]);
                }, 1500 + Math.random() * 2000);
            });
        }

        // 添加消息到聊天界面
        function addMessage(message, isUser = false, isSystem = false) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            
            if (isSystem) {
                messageDiv.className = isSystem === 'image' ? 'image-generation' : 'error-message';
                messageDiv.textContent = message;
            } else {
                messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                messageDiv.textContent = message;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // 如果是AI的回复且不是系统消息，且语音功能开启，则播报
            if (!isUser && !isSystem && voiceEnabled) {
                speakText(message);
            }
            
            return messageDiv;
        }
        
        // 模拟AI思考过程
        async function simulateAIResponse(userInput, fileInfo = null) {
            const typingIndicator = document.getElementById('typingIndicator');
            
            typingIndicator.style.display = 'block';
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
            
            // 检查是否是图片生成请求
            const keywords = extractKeywords(userInput);
            const isImageRequest = keywords.some(word => 
                ["图片", "图像", "生成", "画图", "绘画", "照片", "创建"].includes(word)
            );
            
            setTimeout(async () => {
                typingIndicator.style.display = 'none';
                
                // 如果有文件上传，先提示文件信息
                if (fileInfo) {
                    addMessage(`[已上传文件: ${fileInfo.name} (${(fileInfo.size/1024).toFixed(2)} KB)]`, true);
                    addMessage(`收到您上传的文件: "${fileInfo.name}"。当前版本我主要处理文本对话，文件已成功接收。`, false);
                }
                
                if (userInput.trim() !== '') {
                    if (isImageRequest && Math.random() > 0.3) {
                        const msg = addMessage("正在为您生成图片，请稍候...", false, 'image');
                        
                        setTimeout(async () => {
                            const imageResponse = await handleImageGeneration();
                            const responseMsg = addMessage(imageResponse, false, imageResponse.includes("错误") || imageResponse.includes("不可用") ? 'error' : 'image');
                        }, 2000);
                    } else {
                        const response = findResponse(userInput);
                        
                        if (response === "image_generation") {
                            const msg = addMessage("正在为您生成图片，请稍候...", false, 'image');
                            
                            setTimeout(async () => {
                                const imageResponse = await handleImageGeneration();
                                const responseMsg = addMessage(imageResponse, false, imageResponse.includes("错误") || imageResponse.includes("不可用") ? 'error' : 'image');
                            }, 2000);
                        } else {
                            addMessage(response, false);
                        }
                    }
                }
            }, 800 + Math.random() * 800);
        }
        
        // 文件上传处理
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const fileInfoDiv = document.getElementById('fileInfo');
            const fileNameSpan = document.getElementById('fileName');
            const removeFileBtn = document.getElementById('removeFile');
            const sendButton = document.getElementById('sendButton');
            const userInput = document.getElementById('userInput');
            
            // 显示文件信息
            fileNameSpan.textContent = `${file.name} (${(file.size/1024).toFixed(2)}KB)`;
            fileInfoDiv.style.display = 'block';
            
            // 存储文件信息
            window.currentUploadedFile = {
                name: file.name,
                size: file.size,
                type: file.type,
                file: file
            };
            
            // 清空文件输入框，以便可以重复选择同一文件
            event.target.value = '';
            
            // 修改发送按钮的点击事件，使其包含文件
            const originalSendHandler = sendButton.onclick;
            
            sendButton.onclick = function() {
                const input = userInput.value.trim();
                
                if (input === '' && !window.currentUploadedFile) {
                    if (voiceEnabled) speakText("请输入消息或上传文件");
                    return;
                }
                
                if (input !== '') {
                    addMessage(input, true);
                }
                
                simulateAIResponse(input, window.currentUploadedFile);
                
                // 重置
                userInput.value = '';
                fileInfoDiv.style.display = 'none';
                delete window.currentUploadedFile;
                
                // 恢复原发送处理函数
                sendButton.onclick = originalSendHandler;
            };
            
            // 文件输入框也触发回车发送
            userInput.onkeypress = function(e) {
                if (e.key === 'Enter') {
                    sendButton.click();
                }
            };
        }
        
        // 移除已选文件
        function removeSelectedFile() {
            const fileInfoDiv = document.getElementById('fileInfo');
            const fileInput = document.getElementById('fileUpload');
            
            fileInfoDiv.style.display = 'none';
            delete window.currentUploadedFile;
            fileInput.value = '';
            
            // 恢复原发送处理函数
            const sendButton = document.getElementById('sendButton');
            const userInput = document.getElementById('userInput');
            
            sendButton.onclick = function() {
                const input = userInput.value.trim();
                if (input === '') {
                    if (voiceEnabled) speakText("请输入消息");
                    return;
                }
                
                addMessage(input, true);
                userInput.value = '';
                simulateAIResponse(input);
            };
        }
        
        // 初始化事件监听
        document.addEventListener('DOMContentLoaded', function() {
            const sendButton = document.getElementById('sendButton');
            const userInput = document.getElementById('userInput');
            const presetButtons = document.querySelectorAll('.preset-btn');
            const fileUpload = document.getElementById('fileUpload');
            const removeFileBtn = document.getElementById('removeFile');
            const voiceToggle = document.getElementById('voiceToggle');
            
            // 初始化语音开关
            voiceToggle.addEventListener('click', toggleVoice);
            
            // 文件上传事件
            fileUpload.addEventListener('change', handleFileUpload);
            removeFileBtn.addEventListener('click', removeSelectedFile);
            
            // 原始发送消息函数
            const originalSendFunction = function() {
                const input = userInput.value.trim();
                if (input === '') {
                    if (voiceEnabled) speakText("请输入消息");
                    return;
                }
                
                addMessage(input, true);
                userInput.value = '';
                simulateAIResponse(input);
            };
            
            sendButton.addEventListener('click', originalSendFunction);
            
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendButton.click();
                }
            });
            
            presetButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const question = this.getAttribute('data-question');
                    userInput.value = question;
                    sendButton.click();
                });
            });
            
            // 页面加载后自动发送欢迎消息
            setTimeout(() => {
                simulateAIResponse("你好");
            }, 500);
        });
    </script>
</body>
</html>
