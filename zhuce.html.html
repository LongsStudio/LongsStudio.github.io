<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 方式一：meta 刷新跳转（0秒后跳转） -->
    <meta http-equiv="refresh" content="0; url=https://f.wps.cn/ksform/w/write/tdSy8gJY" />
    <title>正在跳转...</title>
    <style>
        /* 极简加载提示样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e7ef;
            border-top-color: #4a6cf7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.2rem;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        p {
            font-size: 1.1rem;
            color: #555;
        }
        .manual-link {
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        .manual-link a {
            color: #4a6cf7;
            text-decoration: none;
            border-bottom: 1px dashed #b0c4de;
        }
        .manual-link a:hover {
            border-bottom-color: #4a6cf7;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 简单加载动画 -->
        <div class="spinner"></div>
        <p>正在跳转，请稍候…</p>
        <div class="manual-link">
            若未自动跳转，请点击 <a href="https://f.wps.cn/ksform/w/write/tdSy8gJY">此处</a>
        </div>
    </div>

    <!-- 方式二：JavaScript 后备重定向（确保立即跳转） -->
    <script>
        // 立即执行跳转
        window.location.href = "https://f.wps.cn/ksform/w/write/tdSy8gJY";
    </script>
</body>
</html>
